<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消息中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        a { text-decoration: none; color: inherit; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #E8EBF0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .phone-frame {
            width: 375px;
            min-height: 100vh;
            min-height: 100dvh;
            background: #F5F6FA;
            position: relative;
            overflow-x: hidden;
        }

        /* Status Bar */
        .status-bar {
            height: 44px;
            background: #F5F6FA;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            color: #1A1A2E;
            font-size: 12px;
            font-weight: 600;
        }
        .status-bar .time { font-size: 14px; font-weight: 700; }
        .status-bar .icons { display: flex; align-items: center; gap: 6px; }
        .status-bar .icons svg { width: 16px; height: 16px; fill: #1A1A2E; }

        /* Navigation Bar */
        .nav-bar {
            height: 48px;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: relative;
        }
        .nav-bar .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .nav-bar .back-btn:active { background: rgba(0,0,0,0.06); }
        .nav-bar .back-btn svg {
            width: 22px; height: 22px; stroke: #1A1A2E; fill: none;
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }
        .nav-bar .title {
            position: absolute; left: 50%; transform: translateX(-50%);
            color: #1A1A2E; font-size: 17px; font-weight: 600; letter-spacing: 0.5px;
        }
        .nav-bar .action-btn {
            font-size: 13px; color: #FF6B4A; cursor: pointer;
            padding: 6px 10px; border-radius: 8px;
            background: none; border: none; font-family: inherit; font-weight: 500;
        }
        .nav-bar .action-btn:active { background: rgba(255,107,74,0.08); }

        /* Tab Bar */
        .msg-tab-bar {
            background: #FFFFFF;
            display: flex;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 1px 3px rgba(10,22,40,0.04);
        }
        .msg-tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0 10px;
            cursor: pointer;
            position: relative;
            border: none;
            background: none;
            font-family: inherit;
        }
        .msg-tab-item .tab-label {
            font-size: 14px; color: #8E95A9; font-weight: 500;
            transition: all 0.3s;
            display: flex; align-items: center; gap: 6px;
        }
        .msg-tab-item .tab-indicator {
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 0; height: 2px;
            background: #FF6B4A; border-radius: 1px;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .msg-tab-item.active .tab-label { color: #FF6B4A; font-weight: 700; }
        .msg-tab-item.active .tab-indicator { width: 24px; }

        /* Message List */
        .msg-list { padding: 8px 16px 100px; }

        .msg-card {
            background: #FFFFFF;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 1px 3px rgba(10,22,40,0.04);
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            animation: slideInUp 0.4s ease forwards;
        }
        .msg-card:active { transform: scale(0.985); }

        @keyframes slideInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; position: relative;
        }
        .msg-icon svg { width: 22px; height: 22px; fill: #fff; }
        .msg-icon.system-icon { background: #4A7AFF; }
        .msg-icon.activity-icon { background: #FF6B4A; }

        .msg-icon .unread-dot {
            position: absolute; top: -3px; right: -3px;
            width: 10px; height: 10px;
            background: #FF4D4F; border-radius: 50%;
            border: 2px solid #FFFFFF;
            animation: pulseDot 2s infinite;
        }

        @keyframes pulseDot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,79,0.4); }
            50% { box-shadow: 0 0 0 5px rgba(255,77,79,0); }
        }

        .msg-content { flex: 1; min-width: 0; }
        .msg-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 4px;
        }
        .msg-title {
            font-size: 14px; font-weight: 700; color: #1A1A2E;
            line-height: 1.4; flex: 1; margin-right: 8px;
        }
        .msg-card.unread .msg-title { font-weight: 700; }
        .msg-time {
            font-size: 11px; color: #9CA3AF; white-space: nowrap;
            flex-shrink: 0; margin-top: 2px;
        }
        .msg-summary {
            font-size: 12px; color: #6B7280; line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Tab Panel */
        .msg-tab-panel { display: none; }
        .msg-tab-panel.active { display: block; }

        /* Empty State */
        .msg-empty {
            text-align: center;
            padding: 80px 20px;
            display: none;
        }
        .msg-empty.active { display: block; }
        .msg-empty svg {
            width: 80px; height: 80px;
            fill: #D1D5DB; margin-bottom: 16px;
        }
        .msg-empty p { color: #9CA3AF; font-size: 14px; }

        /* AI Customer Service Floating Button */
        .ai-float-btn {
            position: fixed;
            bottom: 24px;
            right: calc(50% - 375px / 2 + 16px);
            width: 52px; height: 52px; border-radius: 50%;
            background: linear-gradient(135deg, #FF6B4A, #FF8A70);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(255,107,74,0.35);
            cursor: pointer; border: none; z-index: 100;
            transition: transform 0.2s;
        }
        .ai-float-btn:active { transform: scale(0.92); }
        .ai-float-btn svg { width: 24px; height: 24px; fill: #fff; }

        /* AI Chat Modal */
        .ai-modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 200;
            display: flex; justify-content: center; align-items: flex-end;
        }
        .ai-modal-overlay.active { opacity: 1; pointer-events: auto; }

        .ai-modal {
            width: 375px;
            height: 75vh;
            background: #F5F6FA;
            border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
        }
        .ai-modal-overlay.active .ai-modal { transform: translateY(0); }

        .ai-modal-header {
            height: 52px;
            background: #FFFFFF;
            border-radius: 20px 20px 0 0;
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-shadow: 0 1px 3px rgba(10,22,40,0.04);
            flex-shrink: 0;
        }
        .ai-modal-header .ai-title {
            font-size: 16px; font-weight: 600; color: #1A1A2E;
            display: flex; align-items: center; gap: 8px;
        }
        .ai-modal-header .ai-title svg { width: 20px; height: 20px; fill: #FF6B4A; }
        .ai-modal-header .close-btn {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; cursor: pointer;
        }
        .ai-modal-header .close-btn:active { background: rgba(0,0,0,0.06); }
        .ai-modal-header .close-btn svg { width: 20px; height: 20px; fill: #8E95A9; }

        .ai-chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }
        .ai-chat-body::-webkit-scrollbar { display: none; }

        .chat-bubble {
            display: flex;
            margin-bottom: 16px;
            align-items: flex-start;
            gap: 8px;
        }
        .chat-bubble.user { flex-direction: row-reverse; }

        .chat-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .chat-avatar.ai-avatar { background: linear-gradient(135deg, #FF6B4A, #FF8A70); }
        .chat-avatar.user-avatar { background: #4A7AFF; }
        .chat-avatar svg { width: 16px; height: 16px; fill: #fff; }

        .chat-text {
            max-width: 70%;
            padding: 10px 14px;
            font-size: 13px;
            line-height: 1.6;
            word-break: break-word;
        }
        .chat-bubble.ai .chat-text {
            background: #FFFFFF;
            color: #1A1A2E;
            border-radius: 4px 14px 14px 14px;
            box-shadow: 0 1px 3px rgba(10,22,40,0.04);
        }
        .chat-bubble.user .chat-text {
            background: #4A7AFF;
            color: #fff;
            border-radius: 14px 4px 14px 14px;
        }

        .ai-input-area {
            background: #FFFFFF;
            padding: 10px 12px 16px;
            display: flex; gap: 10px; align-items: center;
            box-shadow: 0 -1px 3px rgba(10,22,40,0.04);
            flex-shrink: 0;
        }
        .ai-input-area input {
            flex: 1;
            height: 40px;
            border: 1px solid #E5E7EB;
            border-radius: 20px;
            padding: 0 16px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            background: #F5F6FA;
        }
        .ai-input-area input:focus { border-color: #FF6B4A; }
        .ai-input-area .send-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #FF6B4A, #FF8A70);
            border: none; display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
        }
        .ai-input-area .send-btn:active { transform: scale(0.92); }
        .ai-input-area .send-btn svg { width: 18px; height: 18px; fill: #fff; }

        /* Toast */
        .toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%) scale(0.8);
            background: rgba(26,26,46,0.85);
            color: #fff; padding: 12px 24px;
            border-radius: 12px; font-size: 14px;
            z-index: 1000; opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }
        .toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    </style>
</head>
<body>

<script>
    // Message Data
    const messages = [
        {
            id: 1,
            type: 'system',
            title: '您的订单《南海之梦歌舞秀》已出票成功',
            summary: '您的订单《南海之梦歌舞秀》已出票成功，请前往"我的订单"查看电子票。',
            time: '2026-06-14 10:30',
            unread: true
        },
        {
            id: 2,
            type: 'system',
            title: '您的会员等级已升级为金卡会员',
            summary: '恭喜您！您的会员等级已升级为金卡会员，尊享更多专属权益。',
            time: '2026-06-10 09:15',
            unread: false
        },
        {
            id: 3,
            type: 'activity',
            title: '限时活动：充值满500送50，截止至6月30日',
            summary: '活动期间充值满500元即送50元优惠券，数量有限，先到先得！',
            time: '2026-06-14 08:00',
            unread: true
        },
        {
            id: 4,
            type: 'activity',
            title: '新演出上架：《猫》中文版即将开售',
            summary: '经典音乐剧《猫》中文版即将在海南上演，敬请期待！',
            time: '2026-06-08 14:20',
            unread: false
        }
    ];

    const iconSvgs = {
        system: '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>',
        activity: '<svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>'
    };

    function renderMessages() {
        const allList = document.getElementById('list-all');
        const systemList = document.getElementById('list-system');
        const activityList = document.getElementById('list-activity');

        allList.innerHTML = '';
        systemList.innerHTML = '';
        activityList.innerHTML = '';

        messages.forEach((msg, index) => {
            const cardHtml = createMessageCard(msg, index);
            allList.insertAdjacentHTML('beforeend', cardHtml);
            if (msg.type === 'system') {
                systemList.insertAdjacentHTML('beforeend', cardHtml);
            } else {
                activityList.insertAdjacentHTML('beforeend', cardHtml);
            }
        });

        updateEmptyStates();
    }

    function createMessageCard(msg, index) {
        const unreadClass = msg.unread ? 'unread' : '';
        const dotHtml = msg.unread ? '<span class="unread-dot"></span>' : '';
        const iconType = msg.type === 'system' ? 'system-icon' : 'activity-icon';
        const delay = index * 60;

        return `
            <div class="msg-card ${unreadClass}" style="animation-delay:${delay}ms" onclick="handleMessageClick(${msg.id})">
                <div class="msg-icon ${iconType}">
                    ${iconSvgs[msg.type]}
                    ${dotHtml}
                </div>
                <div class="msg-content">
                    <div class="msg-header">
                        <span class="msg-title">${msg.title}</span>
                        <span class="msg-time">${msg.time}</span>
                    </div>
                    <div class="msg-summary">${msg.summary}</div>
                </div>
            </div>
        `;
    }

    function updateEmptyStates() {
        const tabs = ['all', 'system', 'activity'];
        tabs.forEach(tab => {
            const list = document.getElementById('list-' + tab);
            const empty = document.getElementById('empty-' + tab);
            if (list.children.length === 0) {
                empty.classList.add('active');
                list.style.display = 'none';
            } else {
                empty.classList.remove('active');
                list.style.display = 'block';
            }
        });
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.msg-tab-item').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.msg-tab-panel').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('panel-' + tab).classList.add('active');

        // Re-trigger animations
        const list = document.getElementById('list-' + tab);
        if (list) {
            const cards = list.querySelectorAll('.msg-card');
            cards.forEach((card, i) => {
                card.style.animation = 'none';
                card.offsetHeight; // trigger reflow
                card.style.animation = `slideInUp 0.4s ease ${i * 60}ms forwards`;
            });
        }
    }

    function handleMessageClick(id) {
        const msg = messages.find(m => m.id === id);
        if (msg && msg.unread) {
            msg.unread = false;
            renderMessages();
            showToast('已标记为已读');
        }
    }

    function markAllRead() {
        let hasUnread = false;
        messages.forEach(msg => {
            if (msg.unread) {
                msg.unread = false;
                hasUnread = true;
            }
        });
        if (hasUnread) {
            renderMessages();
            showToast('已全部标记为已读');
        } else {
            showToast('没有未读消息');
        }
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // AI Chat
    function openAiChat() {
        document.getElementById('aiModalOverlay').classList.add('active');
        setTimeout(() => {
            const body = document.getElementById('aiChatBody');
            body.scrollTop = body.scrollHeight;
        }, 350);
    }

    function closeAiChat(event) {
        if (!event || event.target.id === 'aiModalOverlay') {
            document.getElementById('aiModalOverlay').classList.remove('active');
        }
    }

    function sendAiMessage() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if (!text) return;

        const body = document.getElementById('aiChatBody');

        // User message
        const userHtml = `
            <div class="chat-bubble user">
                <div class="chat-avatar user-avatar">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <div class="chat-text">${escapeHtml(text)}</div>
            </div>
        `;
        body.insertAdjacentHTML('beforeend', userHtml);
        input.value = '';
        body.scrollTop = body.scrollHeight;

        // AI reply
        setTimeout(() => {
            const aiHtml = `
                <div class="chat-bubble ai">
                    <div class="chat-avatar ai-avatar">
                        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 12h-2v-2h2v2zm0-4h-2V6h2v4z"/></svg>
                    </div>
                    <div class="chat-text">收到您的问题，我们的客服人员会尽快为您解答。</div>
                </div>
            `;
            body.insertAdjacentHTML('beforeend', aiHtml);
            body.scrollTop = body.scrollHeight;
        }, 800);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Init
    renderMessages();
</script>

</body>
</html>
