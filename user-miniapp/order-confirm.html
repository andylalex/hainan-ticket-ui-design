<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>确认订单 - 海南演艺</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #E8EAF0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .page-container {
      width: 100%;
      max-width: 375px;
      min-height: 100vh;
      background: #F5F6FA;
      position: relative;
      overflow-x: hidden;
      padding-bottom: 80px;
    }
    /* Nav */
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      background: linear-gradient(135deg, #0A1628 0%, #132744 50%, #0A1628 100%);
      padding: 0 16px;
      box-shadow: 0 2px 12px rgba(10,22,40,0.15);
    }
    .nav-back {
      position: absolute;
      left: 16px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.2s;
      text-decoration: none;
    }
    .nav-back:active { background: rgba(255,255,255,0.1); }
    .nav-title { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }

    /* Show Info Card */
    .show-info-card {
      background: #fff;
      margin: 12px 16px;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(10,22,40,0.06);
      display: flex;
      gap: 12px;
    }
    .show-info-img {
      width: 80px;
      height: 110px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .show-info-img img { width: 100%; height: 100%; object-fit: cover; }
    .show-info-body { flex: 1; min-width: 0; }
    .show-info-name {
      font-size: 15px;
      font-weight: 700;
      color: #0A1628;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .show-info-meta {
      font-size: 12px;
      color: #888;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .show-info-meta span { display: flex; align-items: center; gap: 4px; }
    .show-info-meta i { font-size: 11px; color: #D4A853; }

    /* Section Card */
    .section-card {
      background: #fff;
      margin: 0 16px 12px;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(10,22,40,0.06);
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #0A1628;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title i { font-size: 14px; color: #FF6B4A; }

    /* Seat List */
    .seat-list { display: flex; flex-direction: column; gap: 8px; }
    .seat-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: #F8F9FC;
      border-radius: 10px;
    }
    .seat-item-left { display: flex; align-items: center; gap: 8px; }
    .seat-item-tag {
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #FF6B4A, #FF8F6B);
    }
    .seat-item-pos { font-size: 13px; color: #555; }
    .seat-item-price { font-size: 14px; font-weight: 700; color: #FF6B4A; }

    /* Discount List */
    .discount-list { display: flex; flex-direction: column; gap: 10px; }
    .discount-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .discount-row .label { color: #666; }
    .discount-row .value { color: #0A1628; font-weight: 500; }
    .discount-row .value.minus { color: #FF6B4A; }
    .discount-divider {
      height: 1px;
      background: rgba(10,22,40,0.06);
      margin: 4px 0;
    }
    .discount-row.total .label { font-weight: 700; color: #0A1628; font-size: 14px; }
    .discount-row.total .value { font-weight: 700; color: #FF6B4A; font-size: 18px; }

    /* Contact Form */
    .form-group { margin-bottom: 12px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: #0A1628;
      margin-bottom: 6px;
      display: block;
    }
    .form-input {
      width: 100%;
      height: 44px;
      border: 1px solid rgba(10,22,40,0.1);
      border-radius: 10px;
      padding: 0 14px;
      font-size: 14px;
      color: #0A1628;
      background: #F8F9FC;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-input:focus { outline: none; border-color: #FF6B4A; background: #fff; }
    .form-input::placeholder { color: #bbb; }
    .form-hint {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }

    /* Bottom Bar */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 375px;
      background: #fff;
      padding: 10px 16px 24px;
      box-shadow: 0 -4px 20px rgba(10,22,40,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 200;
    }
    .bottom-price {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .bottom-price-label { font-size: 12px; color: #888; }
    .bottom-price-value { font-size: 22px; font-weight: 700; color: #FF6B4A; }
    .bottom-price-detail { font-size: 11px; color: #bbb; }
    .bottom-btn {
      padding: 12px 32px;
      border-radius: 24px;
      background: linear-gradient(135deg, #FF6B4A, #FF8F6B);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(255,107,74,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .bottom-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(255,107,74,0.25); }

    /* Payment Methods */
    .payment-section { margin: 0 16px 12px; }
    .payment-card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(10,22,40,0.06);
      margin-bottom: 12px;
    }
    .payment-card-title {
      font-size: 15px;
      font-weight: 700;
      color: #0A1628;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .payment-card-title i { font-size: 14px; color: #FF6B4A; }
    .payment-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(10,22,40,0.06);
      cursor: pointer;
    }
    .payment-option:last-child { border-bottom: none; }
    .payment-option-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .payment-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .payment-icon.wechat { background: linear-gradient(135deg, #07C160, #05a350); color: #fff; }
    .payment-icon.wallet { background: linear-gradient(135deg, #FF6B4A, #FF8F6B); color: #fff; }
    .payment-icon.card { background: linear-gradient(135deg, #D4A853, #E8C878); color: #fff; }
    .payment-icon.points { background: linear-gradient(135deg, #8B5CF6, #A78BFA); color: #fff; }
    .payment-info { display: flex; flex-direction: column; gap: 2px; }
    .payment-name { font-size: 14px; font-weight: 600; color: #0A1628; }
    .payment-desc { font-size: 11px; color: #999; }
    .payment-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .payment-check.checked {
      background: linear-gradient(135deg, #FF6B4A, #FF8F6B);
      border-color: #FF6B4A;
      color: #fff;
      font-size: 12px;
    }
    .payment-check i { display: none; }
    .payment-check.checked i { display: block; }

    /* Points input */
    .points-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0 0;
    }
    .points-input {
      flex: 1;
      height: 36px;
      border: 1px solid rgba(10,22,40,0.1);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 13px;
      color: #0A1628;
      background: #F8F9FC;
      font-family: inherit;
    }
    .points-input:focus { outline: none; border-color: #8B5CF6; background: #fff; }
    .points-use-all-btn {
      padding: 0 12px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #8B5CF6, #A78BFA);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    .points-deduct-display {
      font-size: 12px;
      color: #8B5CF6;
      font-weight: 600;
      padding-top: 6px;
    }

    /* Recharge card list */
    .recharge-card-list { display: flex; flex-direction: column; gap: 8px; padding-top: 8px; }
    .recharge-card-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: #F8F9FC;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .recharge-card-item.selected { border-color: #D4A853; background: #FFF9F0; }
    .recharge-card-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .recharge-card-item.selected .recharge-card-checkbox {
      background: linear-gradient(135deg, #D4A853, #E8C878);
      border-color: #D4A853;
      color: #fff;
      font-size: 10px;
    }
    .recharge-card-info { flex: 1; }
    .recharge-card-name { font-size: 13px; font-weight: 600; color: #0A1628; }
    .recharge-card-no { font-size: 11px; color: #999; }
    .recharge-card-balance { font-size: 13px; font-weight: 700; color: #D4A853; }

    /* Wallet input */
    .wallet-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0 0;
    }
    .wallet-input {
      flex: 1;
      height: 36px;
      border: 1px solid rgba(10,22,40,0.1);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 13px;
      color: #0A1628;
      background: #F8F9FC;
      font-family: inherit;
    }
    .wallet-input:focus { outline: none; border-color: #FF6B4A; background: #fff; }
    .wallet-use-all-btn {
      padding: 0 12px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #FF6B4A, #FF8F6B);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    .wallet-deduct-display {
      font-size: 12px;
      color: #FF6B4A;
      font-weight: 600;
      padding-top: 6px;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(10,22,40,0.85);
      backdrop-filter: blur(16px);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      max-width: 260px;
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
</head>
<body>
<div class="page-container">
  <!-- Nav -->
  <div class="nav-bar">
    <a class="nav-back" href="javascript:history.back()">
      <i class="fas fa-chevron-left"></i>
    </a>
    <span class="nav-title">确认订单</span>
  </div>

  <!-- Show Info -->
  <div class="show-info-card">
    <div class="show-info-img">
      <img src="https://picsum.photos/seed/show-confirm/300/400.jpg" alt="演出">
    </div>
    <div class="show-info-body">
      <div class="show-info-name" id="showName">世界名曲钢琴独奏音乐会</div>
      <div class="show-info-meta">
        <span><i class="far fa-calendar-alt"></i> <span id="showDate">2025.01.15 周三 20:00</span></span>
        <span><i class="fas fa-location-dot"></i> <span id="showVenue">海南大剧院 · 大剧场</span></span>
        <span><i class="fas fa-clock"></i> 约120分钟（含中场休息）</span>
      </div>
    </div>
  </div>

  <!-- Selected Seats -->
  <div class="section-card">
    <div class="section-title"><i class="fas fa-chair"></i> 已选座位</div>
    <div class="seat-list" id="seatList">
      <!-- Generated by JS -->
    </div>
  </div>

  <!-- Discounts -->
  <div class="section-card">
    <div class="section-title"><i class="fas fa-tags"></i> 费用明细</div>
    <div class="discount-list" id="discountList">
      <div class="discount-row">
        <span class="label">商品总价</span>
        <span class="value" id="subtotalPrice">¥0</span>
      </div>
      <!-- 套票抵扣行 -->
      <div class="discount-row" id="packageDiscountRow" style="display:none;">
        <span class="label" id="packageDiscountLabel">套票抵扣</span>
        <span class="value minus" id="packageDiscountValue">-¥0</span>
      </div>
      <!-- 票品折扣行 -->
      <div class="discount-row" id="ticketDiscountRow" style="display:none;">
        <span class="label" id="ticketDiscountLabel">票品折扣</span>
        <span class="value minus" id="ticketDiscountValue">-¥0</span>
      </div>
      <!-- 会员折扣行 -->
      <div class="discount-row" id="memberDiscountRow" style="display:none;">
        <span class="label">会员折扣</span>
        <span class="value minus" id="memberDiscountValue">-¥0</span>
      </div>
      <!-- 优惠券行 -->
      <div class="discount-row" id="couponDiscountRow" style="display:none;">
        <span class="label" id="couponDiscountLabel">优惠券</span>
        <span class="value minus" id="couponDiscountValue">-¥0</span>
      </div>
      <!-- 积分抵扣行 -->
      <div class="discount-row" id="pointsDiscountRow" style="display:none;">
        <span class="label">积分抵扣</span>
        <span class="value minus" id="pointsDiscountValue">-¥0</span>
      </div>
      <div class="discount-divider"></div>
      <div class="discount-row total">
        <span class="label">应付金额</span>
        <span class="value" id="finalAmount">¥0</span>
      </div>
    </div>

    <!-- 套票选择入口 -->
    <div class="entry-row" id="packageEntry" onclick="openPackageSheet()" style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(10,22,40,0.06);">
      <div class="entry-left">
        <div class="entry-icon" style="width:28px;height:28px;border-radius:8px;background:rgba(212,168,83,0.15);color:#D4A853;display:flex;align-items:center;justify-content:center;font-size:12px;"><i class="fas fa-layer-group"></i></div>
        <span class="entry-text" id="packageEntryText" style="font-size:13px;color:#0A1628;">使用套票</span>
      </div>
      <span class="entry-arrow" style="color:#999;font-size:16px;">›</span>
    </div>

    <!-- 优惠券选择入口 -->
    <div class="entry-row" id="couponEntry" onclick="openCouponSheet()" style="padding-top:8px;">
      <div class="entry-left">
        <div class="entry-icon" style="width:28px;height:28px;border-radius:8px;background:rgba(255,107,74,0.15);color:#FF6B4A;display:flex;align-items:center;justify-content:center;font-size:12px;"><i class="fas fa-ticket"></i></div>
        <span class="entry-text" id="couponEntryText" style="font-size:13px;color:#0A1628;">使用优惠券</span>
      </div>
      <span class="entry-arrow" style="color:#999;font-size:16px;">›</span>
    </div>
  </div>

  <!-- Contact Info -->
  <div class="section-card">
    <div class="section-title"><i class="fas fa-user"></i> 取票人信息</div>
    <div class="form-group">
      <label class="form-label">姓名</label>
      <input type="text" class="form-input" placeholder="请输入取票人姓名" value="张三">
    </div>
    <div class="form-group">
      <label class="form-label">手机号</label>
      <input type="tel" class="form-input" placeholder="请输入手机号" value="138****8888">
      <div class="form-hint">电子票将通过短信发送至该手机号</div>
    </div>
    <div class="form-group">
      <label class="form-label">身份证号</label>
      <input type="text" class="form-input" placeholder="请输入身份证号" maxlength="18">
    </div>
  </div>

  <!-- Payment Methods -->
  <div class="payment-section">
    <div class="payment-card">
      <div class="payment-card-title"><i class="fas fa-credit-card"></i> 支付方式</div>

      <!-- WeChat Pay (always shown, auto pays remainder) -->
      <div class="payment-option" style="cursor:default;">
        <div class="payment-option-left">
          <div class="payment-icon wechat"><i class="fab fa-weixin"></i></div>
          <div class="payment-info">
            <span class="payment-name">微信支付</span>
            <span class="payment-desc" id="wechatDesc">剩余应付 ¥1,034.00</span>
          </div>
        </div>
        <div class="payment-check checked" style="pointer-events:none;"><i class="fas fa-check"></i></div>
      </div>

      <!-- Wallet Pay -->
      <div class="payment-option" onclick="toggleWallet()">
        <div class="payment-option-left">
          <div class="payment-icon wallet"><i class="fas fa-wallet"></i></div>
          <div class="payment-info">
            <span class="payment-name">钱包支付</span>
            <span class="payment-desc" id="walletDesc">可用余额 ¥1,280.00</span>
          </div>
        </div>
        <div class="payment-check" id="checkWallet"><i class="fas fa-check"></i></div>
      </div>
      <div id="walletInputArea" style="display:none;">
        <div class="wallet-input-row">
          <input type="number" class="wallet-input" id="walletInput" placeholder="输入使用金额" min="0" step="0.01" oninput="onWalletInput()">
          <button class="wallet-use-all-btn" onclick="event.stopPropagation(); useAllWallet()">全部使用</button>
        </div>
        <div class="wallet-deduct-display" id="walletDeductDisplay">抵扣 ¥0.00</div>
      </div>

      <!-- Recharge Card -->
      <div class="payment-option" onclick="toggleRechargeCard()">
        <div class="payment-option-left">
          <div class="payment-icon card"><i class="fas fa-credit-card"></i></div>
          <div class="payment-info">
            <span class="payment-name">充值卡支付</span>
            <span class="payment-desc" id="rechargeCardDesc">可用 ¥1,700.00</span>
          </div>
        </div>
        <div class="payment-check" id="checkRechargeCard"><i class="fas fa-check"></i></div>
      </div>
      <div id="rechargeCardListArea" style="display:none;">
        <div class="recharge-card-list" id="rechargeCardList">
          <!-- Generated by JS -->
        </div>
        <div class="wallet-deduct-display" id="rechargeCardDeductDisplay" style="color:var(--gold);padding-top:8px;">抵扣 ¥0.00</div>
      </div>

      <!-- Points -->
      <div class="payment-option" onclick="togglePoints()">
        <div class="payment-option-left">
          <div class="payment-icon points"><i class="fas fa-star"></i></div>
          <div class="payment-info">
            <span class="payment-name">积分抵扣</span>
            <span class="payment-desc" id="pointsDesc">可用 1,280 积分</span>
          </div>
        </div>
        <div class="payment-check" id="checkPoints"><i class="fas fa-check"></i></div>
      </div>
      <div id="pointsInputArea" style="display:none;">
        <div class="points-input-row">
          <input type="number" class="points-input" id="pointsInput" placeholder="输入使用积分" min="0" step="1" oninput="onPointsInput()">
          <button class="points-use-all-btn" onclick="event.stopPropagation(); useAllPoints()">全部使用</button>
        </div>
        <div class="points-deduct-display" id="pointsDeductDisplay">抵扣 ¥0.00</div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <div class="bottom-price">
    <span class="bottom-price-label">应付</span>
    <span class="bottom-price-value" id="totalPrice">¥1,034</span>
    <span class="bottom-price-detail" id="priceDetail">已优惠¥326</span>
  </div>
  <button class="bottom-btn" onclick="submitOrder()">确认支付</button>
</div>

<div class="toast" id="toast"></div>

<script>
  // Parse URL params
  const params = new URLSearchParams(window.location.search);
  const showName = params.get('show') || '世界名曲钢琴独奏音乐会';
  const showDate = params.get('date') || '2025.01.15 周三 20:00';
  const showVenue = params.get('venue') || '海南大剧院 · 大剧场';
  const seatsParam = params.get('seats');

  document.getElementById('showName').textContent = showName;
  document.getElementById('showDate').textContent = showDate;
  document.getElementById('showVenue').textContent = showVenue;

  // Parse seats from URL
  let seatsData = [];
  if (seatsParam) {
    try {
      seatsData = JSON.parse(decodeURIComponent(seatsParam));
    } catch(e) {}
  }

  // Parse vouchers from URL (from seat-selection page)
  let voucherData = [];
  const vouchersParam = params.get('vouchers');
  if (vouchersParam) {
    try {
      voucherData = JSON.parse(decodeURIComponent(vouchersParam));
    } catch(e) {}
  }

  // ========== Order State ==========
  let subtotal = 0; // 商品总价（座位原价之和）
  let ticketDiscount = 0; // 票品折扣（早鸟票等）
  let memberDiscount = 0; // 会员折扣
  let packageDeduction = 0; // 套票观演券抵扣
  let couponDeduction = 0; // 优惠券抵扣
  let pointsDeduction = 0; // 积分抵扣金额

  // 计算基础金额
  seatsData.forEach(function(s) {
    subtotal += (s.originalPrice || s.price);
  });
  // 票品折扣 = 原价 - 折扣价
  const discountedTotal = seatsData.reduce((sum, s) => sum + s.price, 0);
  ticketDiscount = Math.max(0, subtotal - discountedTotal);

  // 应用套票观演券抵扣（从选座页带入）
  let appliedVouchers = [];
  if (voucherData.length > 0) {
    appliedVouchers = voucherData;
    packageDeduction = voucherData.reduce((sum, v) => sum + v.amount, 0);
  }

  // 当前应付金额（扣除套票后）
  let currentPayable = Math.max(0, discountedTotal - packageDeduction);

  // ========== Coupon Data ==========
  const COUPONS = [
    { id: 1, amount: 50, minAmount: 300, name: '满300减50', scope: '全场通用', expire: '2026-06-30', disabled: false, reason: '' },
    { id: 2, amount: 30, minAmount: 200, name: '满200减30', scope: '仅限演出票', expire: '2026-05-31', disabled: false, reason: '' },
    { id: 3, amount: 100, minAmount: 800, name: '满800减100', scope: 'VIP专享', expire: '2026-07-31', disabled: false, reason: '' },
    { id: 4, amount: 20, minAmount: 100, name: '满100减20', scope: '全场通用', expire: '2025-12-31', disabled: true, reason: '已过期' },
    { id: 5, amount: 80, minAmount: 500, name: '满500减80', scope: '全场通用', expire: '2026-08-31', disabled: true, reason: '不满足金额条件' }
  ];
  let selectedCoupon = null;

  // ========== Payment State ==========
  const AVAILABLE_BALANCE = 1280.00;
  const AVAILABLE_POINTS = 1280;
  const POINTS_RATE = 0.01;
  const POINTS_MAX_PERCENT = 0.10;

  let walletEnabled = false;
  let walletUsed = 0;
  let rechargeCardEnabled = false;
  let pointsEnabled = false;
  let pointsUsed = 0;

  const RECHARGE_CARDS = [
    { id: 'rc001', name: 'VIP充值卡', balance: 500, cardNo: '8888****1234' },
    { id: 'rc002', name: '礼品卡', balance: 200, cardNo: '8888****5678' },
    { id: 'rc003', name: '会员储值卡', balance: 1000, cardNo: '8888****9012' }
  ];
  let selectedRechargeCards = new Set();

  let orderTotal = currentPayable; // 当前应付金额（动态计算）

  // ========== Render Seats with Voucher Info ==========
  function renderSeats() {
    const seatList = document.getElementById('seatList');
    seatList.innerHTML = '';
    seatsData.forEach(function(s, index) {
      // 检查该座位是否有观演券抵扣
      const matchedVoucher = appliedVouchers.find(v => v.seatIndex === index);
      const voucherTag = matchedVoucher ?
        '<span class="seat-item-voucher" style="margin-left:6px;padding:1px 5px;border-radius:6px;font-size:9px;font-weight:600;background:linear-gradient(135deg,#D4A853,#E8C878);color:#fff;">观演券抵扣</span>' : '';
      const priceDisplay = matchedVoucher ?
        '<span style="text-decoration:line-through;color:#999;font-size:11px;margin-right:4px;">¥' + s.price + '</span><span style="color:var(--coral-orange);font-weight:600;">¥0</span>' :
        '¥' + s.price;

      seatList.innerHTML +=
        '<div class="seat-item">' +
          '<div class="seat-item-left">' +
            '<span class="seat-item-tag">' + (s.tierName || s.tier || 'A档') + '</span>' +
            '<span class="seat-item-pos">' + s.row + '排 ' + s.col + '座</span>' +
            voucherTag +
          '</div>' +
          '<div class="seat-item-price">' + priceDisplay + '</div>' +
        '</div>';
    });
  }

  // ========== Render Discount List ==========
  function renderDiscountList() {
    document.getElementById('subtotalPrice').textContent = '¥' + subtotal.toLocaleString();

    // 套票抵扣
    const pkgRow = document.getElementById('packageDiscountRow');
    if (packageDeduction > 0) {
      pkgRow.style.display = 'flex';
      document.getElementById('packageDiscountLabel').textContent = '套票抵扣（' + appliedVouchers.length + '张观演券）';
      document.getElementById('packageDiscountValue').textContent = '-¥' + packageDeduction.toLocaleString();
    } else {
      pkgRow.style.display = 'none';
    }

    // 票品折扣
    const ticketRow = document.getElementById('ticketDiscountRow');
    if (ticketDiscount > 0) {
      ticketRow.style.display = 'flex';
      document.getElementById('ticketDiscountLabel').textContent = '票品折扣（早鸟优惠）';
      document.getElementById('ticketDiscountValue').textContent = '-¥' + ticketDiscount.toLocaleString();
    } else {
      ticketRow.style.display = 'none';
    }

    // 会员折扣（模拟）
    const memberRow = document.getElementById('memberDiscountRow');
    if (memberDiscount > 0) {
      memberRow.style.display = 'flex';
      document.getElementById('memberDiscountValue').textContent = '-¥' + memberDiscount.toLocaleString();
    } else {
      memberRow.style.display = 'none';
    }

    // 优惠券
    const couponRow = document.getElementById('couponDiscountRow');
    if (selectedCoupon && couponDeduction > 0) {
      couponRow.style.display = 'flex';
      document.getElementById('couponDiscountLabel').textContent = '优惠券（' + selectedCoupon.name + '）';
      document.getElementById('couponDiscountValue').textContent = '-¥' + couponDeduction.toLocaleString();
    } else {
      couponRow.style.display = 'none';
    }

    // 积分抵扣
    const pointsRow = document.getElementById('pointsDiscountRow');
    if (pointsEnabled && pointsDeduction > 0) {
      pointsRow.style.display = 'flex';
      document.getElementById('pointsDiscountValue').textContent = '-¥' + pointsDeduction.toFixed(2);
    } else {
      pointsRow.style.display = 'none';
    }

    // 更新应付金额
    const final = Math.max(0, currentPayable - couponDeduction - pointsDeduction - walletUsed - getRechargeCardDeduct());
    document.getElementById('finalAmount').textContent = '¥' + final.toLocaleString();
    document.getElementById('totalPrice').textContent = '¥' + final.toLocaleString();

    // 更新优惠提示
    const totalDeduct = ticketDiscount + memberDiscount + packageDeduction + couponDeduction + pointsDeduction + walletUsed + getRechargeCardDeduct();
    const priceDetail = document.getElementById('priceDetail');
    if (totalDeduct > 0) {
      priceDetail.textContent = '已优惠¥' + totalDeduct.toLocaleString();
      priceDetail.style.display = 'inline';
    } else {
      priceDetail.style.display = 'none';
    }
  }

  // ========== Coupon Logic ==========
  function openCouponSheet() {
    const overlay = document.createElement('div');
    overlay.className = 'coupon-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;opacity:0;transition:opacity 0.25s ease;';

    const sheet = document.createElement('div');
    sheet.className = 'coupon-sheet';
    sheet.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;z-index:201;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);max-height:75vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(0,0,0,0.1);';

    let html = '<div style="padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;">' +
      '<span style="color:#1a1a1a;font-size:16px;font-weight:600;">选择优惠券</span>' +
      '<span onclick="closeCouponSheet()" style="color:#999;font-size:22px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;">×</span>' +
      '</div>';
    html += '<div style="padding:0 16px 16px;">';

    COUPONS.forEach(coupon => {
      let isDisabled = coupon.disabled;
      let reason = coupon.reason;
      if (!isDisabled && currentPayable < coupon.minAmount) {
        isDisabled = true;
        reason = '需满¥' + coupon.minAmount + '可用';
      }
      const isSelected = selectedCoupon && selectedCoupon.id === coupon.id;

      html += '<div class="coupon-card' + (isDisabled ? ' disabled' : '') + (isSelected ? ' selected' : '') + '" ' +
        (isDisabled ? '' : 'onclick="selectCoupon(' + coupon.id + ');closeCouponSheet();"') +
        ' style="display:flex;border-radius:10px;margin-bottom:8px;overflow:hidden;border:1.5px solid ' + (isSelected ? '#FF6B4A' : (isDisabled ? '#f0f0f0' : '#f5f5f5')) + ';cursor:pointer;background:#fafafa;">' +
        '<div style="width:76px;min-width:76px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(255,107,74,0.1),rgba(255,138,110,0.04));padding:10px 6px;">' +
        '<span style="font-size:18px;font-weight:700;color:' + (isDisabled ? '#ccc' : '#FF6B4A') + ';">¥' + coupon.amount + '</span>' +
        '<span style="font-size:9px;color:#999;margin-top:2px;">满' + coupon.minAmount + '可用</span>' +
        '</div>' +
        '<div style="flex:1;padding:10px 12px;display:flex;flex-direction:column;justify-content:center;">' +
        '<div style="font-size:13px;font-weight:600;color:' + (isDisabled ? '#bbb' : '#1a1a1a') + ';">' + coupon.name + '</div>' +
        '<div style="font-size:11px;color:#999;margin-top:2px;">' + coupon.scope + '</div>' +
        '<div style="font-size:10px;color:#aaa;margin-top:2px;">有效期至 ' + coupon.expire + '</div>' +
        (isDisabled && reason ? '<div style="font-size:10px;color:#FF6B4A;margin-top:3px;font-weight:500;">' + reason + '</div>' : '') +
        '</div>' +
        (isSelected ? '<div style="width:28px;display:flex;align-items:center;justify-content:center;"><span style="color:#FF6B4A;font-size:16px;">✓</span></div>' : '') +
        '</div>';
    });

    html += '<div onclick="clearCoupon();closeCouponSheet();" style="display:flex;align-items:center;justify-content:center;padding:12px;border-radius:10px;border:1px dashed #ddd;color:#999;font-size:13px;cursor:pointer;margin-top:4px;">不使用优惠券</div>';
    html += '</div>';

    sheet.innerHTML = html;
    document.body.appendChild(overlay);
    document.body.appendChild(sheet);

    requestAnimationFrame(() => {
      overlay.style.opacity = '1';
      sheet.style.transform = 'translateY(0)';
    });

    overlay.onclick = closeCouponSheet;
  }

  window.closeCouponSheet = function() {
    const overlay = document.querySelector('.coupon-overlay');
    const sheet = document.querySelector('.coupon-sheet');
    if (overlay) overlay.remove();
    if (sheet) sheet.remove();
  };

  window.selectCoupon = function(couponId) {
    selectedCoupon = COUPONS.find(c => c.id === couponId);
    couponDeduction = selectedCoupon ? selectedCoupon.amount : 0;
    updateCouponEntry();
    renderDiscountList();
    recalcTotal();
  };

  window.clearCoupon = function() {
    selectedCoupon = null;
    couponDeduction = 0;
    updateCouponEntry();
    renderDiscountList();
    recalcTotal();
  };

  function updateCouponEntry() {
    const text = document.getElementById('couponEntryText');
    if (selectedCoupon) {
      text.textContent = '已选：' + selectedCoupon.name + ' -¥' + selectedCoupon.amount;
      text.style.color = '#FF6B4A';
    } else {
      const maxDiscount = getMaxAvailableCouponDiscount(currentPayable);
      if (maxDiscount > 0) {
        text.textContent = '有' + maxDiscount + '元优惠券可用';
        text.style.color = '#FF6B4A';
      } else {
        text.textContent = '暂无可用优惠券';
        text.style.color = '#999';
      }
    }
  }

  function getMaxAvailableCouponDiscount(total) {
    let max = 0;
    COUPONS.forEach(c => {
      if (!c.disabled && total >= c.minAmount && c.amount > max) {
        max = c.amount;
      }
    });
    return max;
  }

  // ========== Package Entry Update ==========
  function updatePackageEntry() {
    const text = document.getElementById('packageEntryText');
    if (appliedVouchers.length > 0) {
      text.textContent = '已使用' + appliedVouchers.length + '张观演券 -¥' + packageDeduction;
      text.style.color = '#D4A853';
    } else {
      text.textContent = '使用套票';
      text.style.color = '#0A1628';
    }
  }

  // ========== Package Sheet (view only from seat-selection) ==========
  function openPackageSheet() {
    if (appliedVouchers.length === 0) {
      showToast('暂无可用套票观演券');
      return;
    }
    const overlay = document.createElement('div');
    overlay.className = 'coupon-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;opacity:0;transition:opacity 0.25s ease;';

    const sheet = document.createElement('div');
    sheet.className = 'coupon-sheet';
    sheet.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;z-index:201;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);max-height:75vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(0,0,0,0.1);';

    let html = '<div style="padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;">' +
      '<span style="color:#1a1a1a;font-size:16px;font-weight:600;">已使用观演券</span>' +
      '<span onclick="closeCouponSheet()" style="color:#999;font-size:22px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;">×</span>' +
      '</div>';
    html += '<div style="padding:0 16px 16px;">';

    appliedVouchers.forEach(v => {
      const seat = seatsData[v.seatIndex];
      html += '<div style="display:flex;border-radius:10px;margin-bottom:8px;overflow:hidden;border:1.5px solid #D4A853;background:#fafafa;">' +
        '<div style="width:76px;min-width:76px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(212,168,83,0.1),rgba(232,200,120,0.04));padding:10px 6px;">' +
        '<span style="font-size:14px;font-weight:700;color:#D4A853;">' + v.name.split(' - ')[1] + '</span>' +
        '<span style="font-size:9px;color:#999;margin-top:2px;">价值¥' + v.amount + '</span>' +
        '</div>' +
        '<div style="flex:1;padding:10px 12px;display:flex;flex-direction:column;justify-content:center;">' +
        '<div style="font-size:13px;font-weight:600;color:#1a1a1a;">' + v.name.split(' - ')[0] + '</div>' +
        '<div style="font-size:11px;color:#999;margin-top:2px;">抵扣座位：' + (seat ? seat.tierName + ' ' + seat.row + '排' + seat.col + '座' : '未知座位') + '</div>' +
        '</div>' +
        '</div>';
    });

    html += '</div>';
    sheet.innerHTML = html;
    document.body.appendChild(overlay);
    document.body.appendChild(sheet);

    requestAnimationFrame(() => {
      overlay.style.opacity = '1';
      sheet.style.transform = 'translateY(0)';
    });

    overlay.onclick = closeCouponSheet;
  }

  // ========== Toggle Functions ==========
  function toggleWallet() {
    walletEnabled = !walletEnabled;
    document.getElementById('checkWallet').classList.toggle('checked', walletEnabled);
    document.getElementById('walletInputArea').style.display = walletEnabled ? 'block' : 'none';
    if (!walletEnabled) {
      walletUsed = 0;
      document.getElementById('walletInput').value = '';
      document.getElementById('walletDeductDisplay').textContent = '抵扣 ¥0.00';
    }
    recalcTotal();
  }

  function toggleRechargeCard() {
    rechargeCardEnabled = !rechargeCardEnabled;
    document.getElementById('checkRechargeCard').classList.toggle('checked', rechargeCardEnabled);
    document.getElementById('rechargeCardListArea').style.display = rechargeCardEnabled ? 'block' : 'none';
    if (!rechargeCardEnabled) {
      selectedRechargeCards.clear();
      renderRechargeCards();
    } else {
      renderRechargeCards();
    }
    recalcTotal();
  }

  function togglePoints() {
    pointsEnabled = !pointsEnabled;
    document.getElementById('checkPoints').classList.toggle('checked', pointsEnabled);
    document.getElementById('pointsInputArea').style.display = pointsEnabled ? 'block' : 'none';
    if (!pointsEnabled) {
      pointsUsed = 0;
      document.getElementById('pointsInput').value = '';
      document.getElementById('pointsDeductDisplay').textContent = '抵扣 ¥0.00';
    }
    recalcTotal();
  }

  // ========== Wallet Logic ==========
  function onWalletInput() {
    const input = document.getElementById('walletInput');
    let val = parseFloat(input.value) || 0;
    // 计算当前剩余可抵扣金额（扣除已选充值卡和积分）
    const remaining = getRemainingPayable();
    const maxUsable = Math.min(AVAILABLE_BALANCE, remaining);

    if (val > maxUsable) {
      val = maxUsable;
      input.value = val.toFixed(2);
    }
    if (val < 0) {
      val = 0;
      input.value = '';
    }

    walletUsed = val;
    document.getElementById('walletDeductDisplay').textContent = `抵扣 ¥${walletUsed.toFixed(2)}`;
    recalcTotal();
  }

  function useAllWallet() {
    const remaining = getRemainingPayable();
    const maxUsable = Math.min(AVAILABLE_BALANCE, remaining);
    walletUsed = maxUsable;
    document.getElementById('walletInput').value = walletUsed.toFixed(2);
    document.getElementById('walletDeductDisplay').textContent = `抵扣 ¥${walletUsed.toFixed(2)}`;
    recalcTotal();
  }

  function updateWalletDesc() {
    const desc = document.getElementById('walletDesc');
    if (walletEnabled && walletUsed > 0) {
      desc.textContent = `已用 ¥${walletUsed.toFixed(2)}`;
    } else {
      desc.textContent = `可用余额 ¥${AVAILABLE_BALANCE.toFixed(2)}`;
    }
  }

  // ========== Recharge Card Logic ==========
  function renderRechargeCards() {
    const container = document.getElementById('rechargeCardList');
    if (RECHARGE_CARDS.length === 0) {
      container.innerHTML = '<div style="text-align:center;color:#999;padding:12px;font-size:11px;">暂无绑定的充值卡</div>';
      return;
    }
    container.innerHTML = RECHARGE_CARDS.map(card => {
      const isSelected = selectedRechargeCards.has(card.id);
      return `
        <div class="recharge-card-item ${isSelected ? 'selected' : ''}" onclick="event.stopPropagation(); toggleRechargeCardItem('${card.id}')">
          <div class="recharge-card-checkbox"><i class="fas fa-check"></i></div>
          <div class="recharge-card-info">
            <div class="recharge-card-name">${card.name}</div>
            <div class="recharge-card-no">${card.cardNo}</div>
          </div>
          <div class="recharge-card-balance">¥${card.balance}</div>
        </div>
      `;
    }).join('');
  }

  function toggleRechargeCardItem(cardId) {
    if (selectedRechargeCards.has(cardId)) {
      selectedRechargeCards.delete(cardId);
    } else {
      selectedRechargeCards.add(cardId);
    }
    renderRechargeCards();
    recalcTotal();
  }

  function getRechargeCardDeduct() {
    const totalCardBalance = RECHARGE_CARDS
      .filter(c => selectedRechargeCards.has(c.id))
      .reduce((sum, c) => sum + c.balance, 0);
    return Math.min(totalCardBalance, currentPayable);
  }

  function updateRechargeCardDesc() {
    const desc = document.getElementById('rechargeCardDesc');
    const deduct = getRechargeCardDeduct();
    if (selectedRechargeCards.size > 0 && deduct > 0) {
      desc.textContent = `已选${selectedRechargeCards.size}张，抵扣¥${deduct.toFixed(2)}`;
    } else if (selectedRechargeCards.size > 0) {
      desc.textContent = `已选${selectedRechargeCards.size}张`;
    } else {
      const total = RECHARGE_CARDS.reduce((sum, c) => sum + c.balance, 0);
      desc.textContent = `可用 ¥${total.toFixed(2)}`;
    }
    document.getElementById('rechargeCardDeductDisplay').textContent = `抵扣 ¥${deduct.toFixed(2)}`;
  }

  // ========== Points Logic ==========
  function onPointsInput() {
    const input = document.getElementById('pointsInput');
    let val = parseInt(input.value) || 0;
    const remaining = getRemainingPayable();
    const maxPointsDeduct = Math.floor(remaining * POINTS_MAX_PERCENT / POINTS_RATE);
    const maxUsable = Math.min(AVAILABLE_POINTS, maxPointsDeduct);

    if (val > maxUsable) {
      val = maxUsable;
      input.value = val;
    }
    if (val < 0) {
      val = 0;
      input.value = '';
    }

    pointsUsed = val;
    const deductValue = (pointsUsed * POINTS_RATE).toFixed(2);
    document.getElementById('pointsDeductDisplay').textContent = `抵扣 ¥${deductValue}`;
    recalcTotal();
  }

  function useAllPoints() {
    const remaining = getRemainingPayable();
    const maxPointsDeduct = Math.floor(remaining * POINTS_MAX_PERCENT / POINTS_RATE);
    const maxUsable = Math.min(AVAILABLE_POINTS, maxPointsDeduct);
    pointsUsed = maxUsable;
    document.getElementById('pointsInput').value = pointsUsed;
    const deductValue = (pointsUsed * POINTS_RATE).toFixed(2);
    document.getElementById('pointsDeductDisplay').textContent = `抵扣 ¥${deductValue}`;
    recalcTotal();
  }

  function updatePointsDesc() {
    const desc = document.getElementById('pointsDesc');
    if (pointsEnabled && pointsUsed > 0) {
      desc.textContent = `已用 ${pointsUsed} 积分`;
    } else {
      desc.textContent = `可用 ${AVAILABLE_POINTS} 积分`;
    }
  }

  // ========== Remaining Payable (for clamping inputs) ==========
  function getRemainingPayable() {
    let remaining = currentPayable;
    // 扣除优惠券
    if (selectedCoupon && couponDeduction > 0) {
      remaining -= couponDeduction;
    }
    // 扣除已选充值卡
    if (rechargeCardEnabled && selectedRechargeCards.size > 0) {
      remaining -= getRechargeCardDeduct();
    }
    // 扣除已用积分
    if (pointsEnabled && pointsUsed > 0) {
      remaining -= pointsUsed * POINTS_RATE;
    }
    return Math.max(0, remaining);
  }

  // ========== Price Recalculation ==========
  function recalcTotal() {
    // 计算积分抵扣金额
    pointsDeduction = pointsEnabled ? pointsUsed * POINTS_RATE : 0;

    // 计算最终应付金额：currentPayable - 优惠券 - 积分 - 充值卡 - 钱包
    let finalTotal = currentPayable;

    // 优惠券抵扣
    if (selectedCoupon && couponDeduction > 0) {
      finalTotal = Math.max(0, finalTotal - couponDeduction);
    }

    // 积分抵扣
    if (pointsEnabled && pointsUsed > 0) {
      finalTotal = Math.max(0, finalTotal - pointsUsed * POINTS_RATE);
    }

    // 充值卡抵扣
    if (rechargeCardEnabled && selectedRechargeCards.size > 0) {
      const cardDeduct = getRechargeCardDeduct();
      finalTotal = Math.max(0, finalTotal - cardDeduct);
    }

    // 钱包抵扣
    if (walletEnabled && walletUsed > 0) {
      finalTotal = Math.max(0, finalTotal - walletUsed);
    }

    // finalTotal 即为微信支付需补足的金额
    document.getElementById('totalPrice').textContent = '¥' + finalTotal.toFixed(2);
    document.getElementById('wechatDesc').textContent = finalTotal > 0 ? `需补足 ¥${finalTotal.toFixed(2)}` : '已全额抵扣，无需微信支付';

    // 更新费用明细
    renderDiscountList();

    // 更新描述
    updateWalletDesc();
    updatePointsDesc();
    updateRechargeCardDesc();
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }

  function submitOrder() {
    showToast('订单提交成功！');
    setTimeout(function() {
      window.location.href = 'order-list.html';
    }, 1500);
  }

  // Init
  renderSeats();
  updatePackageEntry();
  updateCouponEntry();
  renderDiscountList();
  renderRechargeCards();
</script>
</body>
