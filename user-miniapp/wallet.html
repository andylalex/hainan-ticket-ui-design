<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>海南演艺票务系统 - 钱包</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    a { text-decoration: none; color: inherit; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F5F6FA;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 375px;
      min-height: 100vh;
      min-height: 100dvh;
      background: #F5F6FA;
      position: relative;
      overflow-x: hidden;
    }

    /* ========== Top Nav (Light) ========== */
    .top-nav {
      height: 44px;
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0 16px;
    }
    .top-nav .back-btn {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #1A1A2E;
      font-size: 18px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      text-decoration: none;
    }
    .top-nav .back-btn:active { background: rgba(0,0,0,0.06); }
    .top-nav .nav-title {
      color: #1A1A2E;
      font-size: 17px;
      font-weight: 500;
    }

    /* ========== Balance Card ========== */
    .balance-card {
      background: linear-gradient(135deg, #0A1628 0%, #132240 50%, #1a2d50 100%);
      padding: 28px 20px;
      position: relative;
      overflow: hidden;
    }
    .balance-card::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -30px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(212,168,83,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }
    .balance-card::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: -20px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(255,107,74,0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .balance-label {
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }
    .balance-amount {
      color: #fff;
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      position: relative;
      z-index: 1;
    }
    .balance-amount .unit {
      font-size: 20px;
      font-weight: 500;
      margin-right: 2px;
    }

    .balance-meta-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
      position: relative;
      z-index: 1;
    }
    .balance-meta-row .growth-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(212,168,83,0.15);
      border: 1px solid rgba(212,168,83,0.25);
      color: #D4A853;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 10px;
    }
    .balance-meta-row .upgrade-hint {
      color: rgba(255,255,255,0.45);
      font-size: 11px;
    }

    /* ========== Recharge Section ========== */
    .recharge-section {
      padding: 16px;
    }
    .recharge-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(10,22,40,0.06);
    }
    .recharge-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .recharge-title {
      font-size: 16px;
      font-weight: 700;
      color: #1A1A2E;
    }
    .recharge-growth-tip {
      font-size: 12px;
      color: #8E95A9;
      margin-bottom: 16px;
    }

    .amount-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .amount-option {
      padding: 14px 4px;
      border: 1.5px solid #E8E9ED;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      background: #fff;
      -webkit-tap-highlight-color: transparent;
    }
    .amount-option:active { border-color: #FF6B4A; }
    .amount-option.selected {
      border-color: #FF6B4A;
      background: #FFF5F2;
    }
    .amount-option .value {
      font-size: 18px;
      font-weight: 700;
      color: #1A1A2E;
    }
    .amount-option .value .unit {
      font-size: 11px;
      font-weight: 500;
    }
    .amount-option .desc {
      font-size: 10px;
      color: #8E95A9;
      margin-top: 2px;
    }

    .custom-input-wrap {
      margin-bottom: 16px;
      display: none;
    }
    .custom-input-wrap label {
      font-size: 12px;
      color: #5A6178;
      display: block;
      margin-bottom: 6px;
    }
    .custom-input {
      width: 100%;
      height: 44px;
      border: 1.5px solid #E8E9ED;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 600;
      color: #1A1A2E;
      outline: none;
      font-family: inherit;
    }
    .custom-input:focus { border-color: #FF6B4A; }
    .custom-input::placeholder { color: #C8CCD8; font-weight: 400; }

    .confirm-btn {
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #FF6B4A, #FF8A6A);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(255,107,74,0.25);
    }
    .confirm-btn:active { transform: scale(0.98); }

    /* ========== Quick Actions ========== */
    .quick-actions {
      display: flex;
      gap: 12px;
      padding: 0 16px;
    }
    .action-card {
      flex: 1;
      background: #fff;
      border-radius: 12px;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 12px rgba(10,22,40,0.06);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .action-card:active { transform: scale(0.97); }
    .action-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }
    .action-icon.bills { background: linear-gradient(135deg, #EBF0FF, #D6E0FF); color: #4A7AFF; }
    .action-label {
      font-size: 13px;
      font-weight: 500;
      color: #1A1A2E;
    }

    /* ========== Wallet Tools ========== */
    .tools-section {
      padding: 16px;
    }
    .tools-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(10,22,40,0.06);
      overflow: hidden;
    }
    .tool-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .tool-item:active { background: #F8F9FC; }
    .tool-item:not(:last-child) {
      border-bottom: 1px solid #F0F1F5;
    }
    .tool-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .tool-icon-wrap.card-bind { background: linear-gradient(135deg, #FFF0EB, #FFE0D6); color: #FF6B4A; }
    .tool-icon-wrap.security { background: linear-gradient(135deg, #FFF8E7, #FFEDC2); color: #D4A853; }
    .tool-info { flex: 1; min-width: 0; }
    .tool-name {
      font-size: 14px;
      font-weight: 500;
      color: #1A1A2E;
    }
    .tool-desc {
      font-size: 12px;
      color: #8E95A9;
      margin-top: 1px;
    }
    .tool-arrow {
      font-size: 13px;
      color: #C8CCD8;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .tool-badge {
      background: #FF6B4A;
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 8px;
      margin-left: 6px;
      flex-shrink: 0;
    }

    /* ========== Animations ========== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .balance-card { animation: fadeInUp 0.4s ease both; }
    .recharge-section { animation: fadeInUp 0.4s ease 0.05s both; }
    .quick-actions { animation: fadeInUp 0.4s ease 0.1s both; }
    .tools-section { animation: fadeInUp 0.4s ease 0.15s both; }

    .page::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body>
<script>
function goBack(f){var m=location.search.match(/[?&]from=([^&]+)/);if(m)location.href=decodeURIComponent(m[1]);else location.href=f}
</script>

<div class="page">

  <!-- Top Nav -->
  <div class="top-nav">
    <a class="back-btn" href="javascript:void(0)" onclick="goBack('profile.html')"><i class="fas fa-chevron-left"></i></a>
    <span class="nav-title">我的钱包</span>
  </div>

  <!-- Balance Card -->
  <div class="balance-card">
    <div class="balance-label">账户余额（元）</div>
    <div class="balance-amount"><span class="unit">&yen;</span>1,280.00</div>
    <div class="balance-meta-row">
      <span class="growth-badge"><i class="fas fa-gem" style="font-size:10px;"></i> 成长值 3,200</span>
      <span class="upgrade-hint">再充值 &yen;1,800 升级钻石会员</span>
    </div>
  </div>

  <!-- Recharge Section -->
  <div class="recharge-section">
    <div class="recharge-card">
      <div class="recharge-header">
        <div class="recharge-title">充值金额</div>
      </div>
      <div class="recharge-growth-tip">充1元得1成长值，可用于会员等级提升</div>
      <div class="amount-grid">
        <div class="amount-option" onclick="selectAmount(this, 50)">
          <div class="value"><span class="unit">&yen;</span>50</div>
          <div class="desc">+50成长值</div>
        </div>
        <div class="amount-option" onclick="selectAmount(this, 100)">
          <div class="value"><span class="unit">&yen;</span>100</div>
          <div class="desc">+100成长值</div>
        </div>
        <div class="amount-option" onclick="selectAmount(this, 200)">
          <div class="value"><span class="unit">&yen;</span>200</div>
          <div class="desc">+200成长值</div>
        </div>
        <div class="amount-option" onclick="selectAmount(this, 500)">
          <div class="value"><span class="unit">&yen;</span>500</div>
          <div class="desc">+500成长值</div>
        </div>
        <div class="amount-option" onclick="selectAmount(this, 1000)">
          <div class="value"><span class="unit">&yen;</span>1000</div>
          <div class="desc">+1000成长值</div>
        </div>
        <div class="amount-option" onclick="selectAmount(this, 0)">
          <div class="value" style="font-size:14px;">自定义</div>
          <div class="desc">输入金额</div>
        </div>
      </div>
      <div class="custom-input-wrap" id="customInputWrap">
        <label>输入充值金额（元）</label>
        <input type="number" class="custom-input" id="customAmount" placeholder="请输入充值金额">
      </div>
      <button class="confirm-btn" onclick="confirmRecharge()">确认充值</button>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <div class="action-card" onclick="location.href='transaction-record.html'">
      <div class="action-icon bills"><i class="fas fa-receipt"></i></div>
      <span class="action-label">交易记录</span>
    </div>
  </div>

  <!-- Wallet Tools -->
  <div class="tools-section">
    <div class="tools-card">
      <a class="tool-item" href="recharge-card-bind.html">
        <div class="tool-icon-wrap card-bind"><i class="fas fa-credit-card"></i></div>
        <div class="tool-info">
          <div class="tool-name">充值卡绑定</div>
          <div class="tool-desc">绑定实体充值卡，快速到账</div>
        </div>
        <span class="tool-badge">新</span>
        <span class="tool-arrow"><i class="fas fa-chevron-right"></i></span>
      </a>
      <a class="tool-item" href="password-settings.html">
        <div class="tool-icon-wrap security"><i class="fas fa-shield-alt"></i></div>
        <div class="tool-info">
          <div class="tool-name">支付安全</div>
          <div class="tool-desc">管理支付密码与安全设置</div>
        </div>
        <span class="tool-arrow"><i class="fas fa-chevron-right"></i></span>
      </a>
    </div>
  </div>

  <!-- Bottom Spacer -->
  <div style="height: 24px;"></div>

</div>

<script>
  let selectedAmount = 0;

  function selectAmount(el, amount) {
    document.querySelectorAll('.amount-option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    selectedAmount = amount;

    if (amount === 0) {
      document.getElementById('customInputWrap').style.display = 'block';
      document.getElementById('customAmount').focus();
    } else {
      document.getElementById('customInputWrap').style.display = 'none';
    }
  }

  function confirmRecharge() {
    let amount = selectedAmount;
    if (amount === 0) {
      amount = parseFloat(document.getElementById('customAmount').value);
    }
    if (!amount || amount <= 0) {
      alert('请选择或输入充值金额');
      return;
    }
    alert('充值成功！已充值 ¥' + amount.toFixed(2));
    document.querySelectorAll('.amount-option').forEach(el => el.classList.remove('selected'));
    selectedAmount = 0;
    document.getElementById('customInputWrap').style.display = 'none';
    document.getElementById('customAmount').value = '';
  }
</script>

</body>
</html>
