<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>充值卡绑定 - 海南演艺票务系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ========== Reset & Base ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F5F6FA;
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* ========== Phone Frame ========== */
        .phone-frame {
            width: 100%;
            max-width: 375px;
            min-height: 100vh;
            min-height: 100dvh;
            background: #F5F6FA;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* ========== Status Bar ========== */
        .status-bar {
            height: 44px;
            background: linear-gradient(135deg, #0A1628 0%, #132240 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
        }

        .status-bar .time { font-weight: 600; font-size: 14px; }

        .status-bar .icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-bar .icons svg { width: 16px; height: 16px; fill: #fff; }

        /* ========== Navigation Bar ========== */
        .nav-bar {
            height: 48px;
            background: linear-gradient(135deg, #0A1628 0%, #132240 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 16px;
        }

        .nav-bar .back-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
            text-decoration: none;
        }

        .nav-bar .back-btn:hover { background: rgba(255,255,255,0.1); }

        .nav-bar .back-btn svg {
            width: 22px;
            height: 22px;
            stroke: #fff;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-bar .title {
            color: #fff;
            font-size: 17px;
            font-weight: 600;
        }

        /* ========== Section ========== */
        .section {
            margin: 16px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(10, 22, 40, 0.06);
            overflow: hidden;
        }

        .section-header {
            padding: 16px 16px 0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #0A1628;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            font-size: 18px;
            color: #D4A853;
        }

        .section-body {
            padding: 16px;
        }

        /* ========== Form ========== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #5A6178;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            height: 46px;
            background: #F5F6FA;
            border: 1.5px solid #E8E8E8;
            border-radius: 10px;
            padding: 0 14px;
            font-size: 14px;
            color: #0A1628;
            font-family: inherit;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .form-input:focus {
            outline: none;
            border-color: #D4A853;
            background: #fff;
        }

        .form-input::placeholder {
            color: #BBB;
            letter-spacing: 0;
        }

        .form-hint {
            font-size: 12px;
            color: #8E95A9;
            margin-top: 6px;
        }

        /* ========== Bind Button ========== */
        .bind-btn {
            width: 100%;
            height: 46px;
            background: linear-gradient(135deg, #D4A853, #E8C97A);
            border: none;
            border-radius: 12px;
            color: #1A1A1A;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(212,168,83,0.35);
            transition: all 0.2s;
        }

        .bind-btn:active {
            transform: scale(0.98);
        }

        .bind-btn:disabled {
            background: #E0E0E0;
            color: #999;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ========== Card List ========== */
        .card-list {
            padding: 0;
        }

        .card-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #F5F6FA;
            transition: background 0.15s;
        }

        .card-item:last-child {
            border-bottom: none;
        }

        .card-item:active {
            background: #FAFBFD;
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
            font-size: 20px;
        }

        .card-icon.active {
            background: linear-gradient(135deg, #E8F9F5, #D0F5EC);
            color: #00C9A7;
        }

        .card-icon.used {
            background: #F0F1F5;
            color: #8E95A9;
        }

        .card-icon.expired {
            background: #FFF0EB;
            color: #FF6B4A;
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-number {
            font-size: 15px;
            font-weight: 600;
            color: #0A1628;
            margin-bottom: 4px;
            font-family: 'Noto Sans SC', monospace;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: #8E95A9;
        }

        .card-status {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .card-status.active {
            background: #E8F9F5;
            color: #00C9A7;
        }

        .card-status.used {
            background: #F0F1F5;
            color: #8E95A9;
        }

        .card-status.expired {
            background: #FFF0EB;
            color: #FF6B4A;
        }

        .card-amount {
            font-size: 16px;
            font-weight: 700;
            color: #D4A853;
            flex-shrink: 0;
            margin-right: 12px;
        }

        /* ========== Empty State ========== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
        }

        .empty-state .empty-icon {
            font-size: 48px;
            color: #D8DAE0;
            margin-bottom: 12px;
        }

        .empty-state .empty-text {
            font-size: 14px;
            color: #8E95A9;
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(10, 22, 40, 0.85);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ========== Animations ========== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section:nth-of-type(1) { animation: fadeInUp 0.4s ease both; }
        .section:nth-of-type(2) { animation: fadeInUp 0.4s ease 0.1s both; }
    
    
    
    
    
    
  </style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Phone Frame -->
<div class="phone-frame">

    <!-- Status Bar -->
    <div class="status-bar">
    
        <span class="time">9:41</span>
        <div class="icons">
            <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
            <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
        </div>
    </div>

    <!-- Navigation Bar -->
    <div class="nav-bar">
        <a class="back-btn" href="profile.html">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <span class="title">充值卡绑定</span>
    </div>

    <!-- Bind Card Section -->
    <div class="section">
        <div class="section-header">
            <span class="section-title">
                <i class="fas fa-credit-card"></i>
                绑定新卡
            </span>
        </div>
        <div class="section-body">
            <div class="form-group">
                <label class="form-label">充值卡号</label>
                <input type="text" class="form-input" placeholder="请输入充值卡卡号" id="cardNumber" maxlength="20">
                <div class="form-hint">请刮开充值卡背面的涂层，输入16位卡号</div>
            </div>
            <button class="bind-btn" onclick="bindCard()">绑定充值卡</button>
        </div>
    </div>

    <!-- Bound Card List Section -->
    <div class="section">
        <div class="section-header">
            <span class="section-title">
                <i class="fas fa-list-alt"></i>
                已绑定充值卡
            </span>
        </div>
        <div class="card-list">
            <!-- Card 1 - Active -->
            <div class="card-item">
                <div class="card-icon active">
                    <i class="fas fa-credit-card"></i>
                </div>
                <div class="card-info">
                    <div class="card-number">**** **** **** 6688</div>
                    <div class="card-meta">
                        <span>绑定时间：2026-04-10</span>
                    </div>
                </div>
                <div class="card-amount">&yen;200</div>
                <span class="card-status active">已激活</span>
            </div>

            <!-- Card 2 - Used -->
            <div class="card-item">
                <div class="card-icon used">
                    <i class="fas fa-credit-card"></i>
                </div>
                <div class="card-info">
                    <div class="card-number">**** **** **** 3345</div>
                    <div class="card-meta">
                        <span>绑定时间：2026-03-15</span>
                    </div>
                </div>
                <div class="card-amount" style="color: #8E95A9;">&yen;100</div>
                <span class="card-status used">已使用</span>
            </div>

            <!-- Card 3 - Active -->
            <div class="card-item">
                <div class="card-icon active">
                    <i class="fas fa-credit-card"></i>
                </div>
                <div class="card-info">
                    <div class="card-number">**** **** **** 9912</div>
                    <div class="card-meta">
                        <span>绑定时间：2026-04-20</span>
                    </div>
                </div>
                <div class="card-amount">&yen;500</div>
                <span class="card-status active">已激活</span>
            </div>

            <!-- Card 4 - Expired -->
            <div class="card-item">
                <div class="card-icon expired">
                    <i class="fas fa-credit-card"></i>
                </div>
                <div class="card-info">
                    <div class="card-number">**** **** **** 1207</div>
                    <div class="card-meta">
                        <span>绑定时间：2025-12-01</span>
                    </div>
                </div>
                <div class="card-amount" style="color: #BBB;">&yen;50</div>
                <span class="card-status expired">已过期</span>
            </div>
        </div>
    </div>

</div>

<script>
    // ========== Card Number Format ==========
    document.getElementById('cardNumber').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9A-Za-z]/g, '').toUpperCase();
    });

    // ========== Bind Card ==========
    function bindCard() {
        const cardNumber = document.getElementById('cardNumber').value.trim();
        if (!cardNumber) {
            showToast('请输入充值卡号');
            return;
        }
        if (cardNumber.length < 8) {
            showToast('请输入完整的充值卡号');
            return;
        }

        const btn = document.querySelector('.bind-btn');
        btn.disabled = true;
        btn.textContent = '绑定中...';

        setTimeout(() => {
            // Add new card to list
            const list = document.querySelector('.card-list');
            const lastFour = cardNumber.slice(-4);
            const masked = '**** **** **** ' + lastFour;
            const today = new Date().toISOString().split('T')[0];

            const newItem = document.createElement('div');
            newItem.className = 'card-item';
            newItem.style.animation = 'fadeInUp 0.3s ease both';
            newItem.innerHTML = `
                <div class="card-icon active">
                    <i class="fas fa-credit-card"></i>
                </div>
                <div class="card-info">
                    <div class="card-number">${masked}</div>
                    <div class="card-meta">
                        <span>绑定时间：${today}</span>
                    </div>
                </div>
                <div class="card-amount">&yen;--</div>
                <span class="card-status active">待验证</span>
            `;

            list.insertBefore(newItem, list.firstChild);
            document.getElementById('cardNumber').value = '';
            btn.disabled = false;
            btn.textContent = '绑定充值卡';
            showToast('充值卡绑定成功');
        }, 1200);
    }

    // ========== Toast ==========
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }
</script>

</body>
</html>
