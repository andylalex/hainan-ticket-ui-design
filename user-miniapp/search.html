<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>搜索 - 海南演艺票务系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
a { text-decoration: none; color: inherit; }
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --status-bar: #F5F6FA;
  --nav-bg: #FFFFFF;
  --page-bg: #F5F6FA;
  --orange: #FF6B4A;
  --orange-light: #FF8A6E;
  --gold: #D4A853;
  --blue: #4A90D9;
  --emerald: #00C9A7;
  --white: #FFFFFF;
  --text-primary: #1A1A2E;
  --text-secondary: #6B7280;
  --text-light: #999999;
  --border: #E5E7EB;
  --card-shadow: 0 2px 12px rgba(10, 22, 40, 0.08);
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--page-bg);
  margin: 0;
  padding: 0;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  display: flex;
  justify-content: center;
}

/* ===== Page Wrapper ===== */
.page-wrapper {
  width: 375px;
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--page-bg);
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.page-wrapper::-webkit-scrollbar { display: none; }

/* ===== Status Bar ===== */
.status-bar {
  height: 44px;
  background: var(--status-bar);
  flex-shrink: 0;
}

/* ===== Search Header (sticky) ===== */
.search-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--nav-bg);
}
.search-nav {
  background: var(--nav-bg);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ===== Search Type Tabs ===== */
.search-tabs {
  display: flex;
  background: var(--nav-bg);
  border-bottom: 1px solid rgba(0,0,0,0.04);
  padding: 0 16px;
}
.search-tabs .tab-item {
  flex: 1;
  text-align: center;
  padding: 10px 0 12px;
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
  cursor: pointer;
  position: relative;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.2s;
}
.search-tabs .tab-item:active { opacity: 0.6; }
.search-tabs .tab-item.active {
  color: var(--text-primary);
  font-weight: 700;
}
.search-tabs .tab-item.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--orange), var(--gold));
}

.back-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  color: var(--text-primary);
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.back-btn:active { background: var(--page-bg); }

.search-input-wrap {
  flex: 1;
  height: 36px;
  background: var(--page-bg);
  border-radius: 18px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  border: 1.5px solid transparent;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
.search-input-wrap.focused {
  border-color: var(--orange);
  background: var(--white);
  box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.1);
}
.search-input-wrap .search-icon {
  color: var(--text-light);
  font-size: 13px;
  flex-shrink: 0;
}
.search-input-wrap.focused .search-icon { color: var(--orange); }

.search-input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-size: 14px;
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--text-primary);
}
.search-input::placeholder { color: #BBBBBB; }

.clear-btn {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #CCCCCC;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.clear-btn.visible { display: flex; }
.clear-btn i { color: var(--white); font-size: 9px; }

.cancel-btn {
  color: var(--orange);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
  padding: 4px 2px;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.cancel-btn:active { opacity: 0.6; }

/* ===== Suggestion Dropdown ===== */
.suggestion-panel {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 8px 24px rgba(10, 22, 40, 0.12);
  z-index: 90;
  display: none;
  max-height: 320px;
  overflow-y: auto;
  border-radius: 0 0 12px 12px;
}
.suggestion-panel::-webkit-scrollbar { display: none; }
.suggestion-panel.visible {
  display: block;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.suggestion-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid rgba(0,0,0,0.03);
  -webkit-tap-highlight-color: transparent;
}
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:active { background: var(--page-bg); }
.suggestion-item i {
  color: var(--text-light);
  font-size: 14px;
  flex-shrink: 0;
  width: 20px;
  text-align: center;
}
.suggestion-text {
  flex: 1;
  font-size: 14px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.suggestion-text em {
  font-style: normal;
  color: var(--orange);
  font-weight: 600;
}
.suggestion-type {
  font-size: 11px;
  color: var(--text-light);
  flex-shrink: 0;
}

/* ===== Content Area ===== */
.content-area {
  padding: 16px;
}

/* ===== Section ===== */
.search-section { margin-bottom: 24px; }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-title i { font-size: 14px; color: var(--orange); }
.section-action {
  font-size: 12px;
  color: var(--text-light);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  -webkit-tap-highlight-color: transparent;
}
.section-action:active { color: var(--orange); }

/* ===== History Tags ===== */
.history-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.history-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--white);
  border-radius: 20px;
  font-size: 13px;
  color: var(--text-primary);
  cursor: pointer;
  border: 1px solid var(--border);
  max-width: 200px;
  -webkit-tap-highlight-color: transparent;
}
.history-tag:active {
  border-color: var(--orange);
  color: var(--orange);
}
.tag-text {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tag-delete {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.tag-delete i { font-size: 9px; color: #CCCCCC; }

/* ===== Hot Search List ===== */
.hot-list { list-style: none; }
.hot-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(0,0,0,0.03);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.hot-item:last-child { border-bottom: none; }
.hot-item:active { opacity: 0.7; }
.hot-rank {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  background: var(--page-bg);
  color: var(--text-light);
}
.hot-rank.top1 { background: #FF4757; color: var(--white); }
.hot-rank.top2 { background: var(--orange); color: var(--white); }
.hot-rank.top3 { background: var(--blue); color: var(--white); }
.hot-word {
  font-size: 14px;
  color: var(--text-primary);
}

/* ===== Search Results ===== */
.search-results {
  padding: 0 16px 24px;
  display: none;
}
.search-results.visible { display: block; }

.results-header {
  display: flex;
  align-items: center;
  padding: 12px 0;
}
.results-count {
  font-size: 13px;
  color: var(--text-light);
}
.results-count strong {
  color: var(--orange);
  font-weight: 700;
}

.results-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ===== Show Card ===== */
.show-card {
  display: flex;
  gap: 12px;
  background: var(--white);
  border-radius: 14px;
  padding: 12px;
  box-shadow: var(--card-shadow);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(16px);
  animation: cardSlideIn 0.35s ease forwards;
  -webkit-tap-highlight-color: transparent;
}
.show-card:active {
  transform: scale(0.98);
  opacity: 1;
}

@keyframes cardSlideIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.show-card .cover {
  width: 80px;
  height: 100px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}
.show-card .cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.show-card .cover .tag-badge {
  position: absolute;
  top: 4px;
  left: 4px;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 600;
  color: var(--white);
}
.tag-badge.hot { background: linear-gradient(135deg, var(--orange), #FF4757); }
.tag-badge.vip { background: linear-gradient(135deg, var(--gold), #E8C547); }
.tag-badge.new { background: linear-gradient(135deg, var(--emerald), #00E5BF); }

.show-card .info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-width: 0;
  padding: 2px 0;
}
.show-card .info .name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.show-card .info .name em {
  font-style: normal;
  color: var(--orange);
  font-weight: 700;
}
.show-card .info .type-tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 500;
  background: rgba(255, 107, 74, 0.1);
  color: var(--orange);
  margin-top: 4px;
  width: fit-content;
}
.show-card .info .venue {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 3px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.show-card .info .venue i { color: var(--orange); font-size: 9px; }
.show-card .info .datetime {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.show-card .info .datetime i { font-size: 9px; color: var(--emerald); }

.show-card .info .bottom-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-top: 4px;
}
.show-card .info .price {
  font-size: 18px;
  font-weight: 700;
  color: var(--orange);
  font-family: 'Noto Sans SC', sans-serif;
}
.show-card .info .price span {
  font-size: 11px;
  font-weight: 500;
}
.show-card .info .labels {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.show-card .info .label {
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 500;
}
.label.soon { background: rgba(255, 107, 74, 0.1); color: var(--orange); }
.label.member { background: rgba(212, 168, 83, 0.1); color: var(--gold); }
.label.discount { background: rgba(0, 201, 167, 0.1); color: var(--emerald); }

/* ===== Product Card (horizontal, search results) ===== */
.product-card-h {
  display: flex;
  gap: 12px;
  background: var(--white);
  border-radius: 14px;
  padding: 12px;
  box-shadow: var(--card-shadow);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(16px);
  animation: cardSlideIn 0.35s ease forwards;
  -webkit-tap-highlight-color: transparent;
}
.product-card-h:active {
  transform: scale(0.98);
  opacity: 1;
}
.product-card-h .cover {
  width: 96px;
  height: 96px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
  background: var(--page-bg);
}
.product-card-h .cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.product-card-h .cover .tag-badge {
  position: absolute;
  top: 4px;
  left: 4px;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 600;
  color: var(--white);
}
.product-card-h .tag-badge.ptag-hot { background: linear-gradient(135deg, var(--gold), #E8C547); }
.product-card-h .tag-badge.ptag-new { background: linear-gradient(135deg, var(--orange), #FF4757); }
.product-card-h .tag-badge.ptag-points { background: linear-gradient(135deg, var(--emerald), #00E5BF); }

.product-card-h .info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-width: 0;
  padding: 2px 0;
}
.product-card-h .info .name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-card-h .info .name em {
  font-style: normal;
  color: var(--orange);
  font-weight: 700;
}
.product-card-h .info .cat-tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 500;
  background: rgba(212, 168, 83, 0.12);
  color: var(--gold);
  margin-top: 6px;
  width: fit-content;
}
.product-card-h .info .cat-tag i { font-size: 9px; }
.product-card-h .info .bottom-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-top: 6px;
  gap: 8px;
}
.product-card-h .info .price-block {
  display: flex;
  align-items: baseline;
  gap: 4px;
  min-width: 0;
}
.product-card-h .info .price {
  font-size: 18px;
  font-weight: 700;
  color: var(--orange);
  font-family: 'Noto Sans SC', sans-serif;
}
.product-card-h .info .price .symbol { font-size: 11px; font-weight: 500; }
.product-card-h .info .points-price {
  font-size: 15px;
  font-weight: 700;
  color: var(--emerald);
}
.product-card-h .info .points-price .symbol { font-size: 10px; font-weight: 500; }
.product-card-h .info .original-price {
  font-size: 11px;
  color: var(--text-light);
  text-decoration: line-through;
}
.product-card-h .info .sales {
  font-size: 11px;
  color: var(--text-light);
  flex-shrink: 0;
  white-space: nowrap;
}

/* ===== Venue Card (search results) ===== */
.venue-card {
  display: flex;
  gap: 12px;
  background: var(--white);
  border-radius: 14px;
  padding: 12px;
  box-shadow: var(--card-shadow);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(16px);
  animation: cardSlideIn 0.35s ease forwards;
  -webkit-tap-highlight-color: transparent;
}
.venue-card:active {
  transform: scale(0.98);
  opacity: 1;
}
.venue-card .cover {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
  background: linear-gradient(135deg, #0A1628, #1a2d4a);
}
.venue-card .cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  opacity: 0.85;
}
.venue-card .cover .v-icon {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--white);
  font-size: 26px;
}
.venue-card .info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 0;
  padding: 2px 0;
  gap: 4px;
}
.venue-card .info .name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.venue-card .info .name em {
  font-style: normal;
  color: var(--orange);
  font-weight: 700;
}
.venue-card .info .area {
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 4px;
}
.venue-card .info .area i { color: var(--orange); font-size: 10px; }
.venue-card .info .meta {
  font-size: 11px;
  color: var(--text-light);
  display: flex;
  align-items: center;
  gap: 4px;
}
.venue-card .info .meta .shows-count { color: var(--gold); font-weight: 600; }

/* ===== Empty State ===== */
.empty-state {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  text-align: center;
}
.empty-state.visible { display: flex; }
.empty-state .empty-icon {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(10, 22, 40, 0.06);
}
.empty-state .empty-icon i { font-size: 40px; color: #DDDDDD; }
.empty-state .empty-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.empty-state .empty-desc {
  font-size: 13px;
  color: var(--text-light);
  line-height: 1.5;
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(10, 22, 40, 0.88);
  color: var(--white);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  z-index: 999;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(10px);
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<script>function goBack(f){var m=location.search.match(/[?&]from=([^&]+)/);if(m)location.href=decodeURIComponent(m[1]);else location.href=f}</script>

<div class="toast" id="toast"></div>

<div class="page-wrapper" id="pageWrapper">

  <!-- Status Bar -->
  <div class="status-bar"></div>

  <!-- Search Header (sticky) -->
  <div class="search-header">
    <div class="search-nav">
      <div class="back-btn" onclick="goBack('home.html')">
        <i class="fas fa-chevron-left"></i>
      </div>
      <div class="search-input-wrap" id="searchWrap">
        <i class="fas fa-search search-icon"></i>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索演出、场馆、商品" autocomplete="off">
        <div class="clear-btn" id="clearBtn" onclick="clearInput()">
          <i class="fas fa-times"></i>
        </div>
      </div>
      <div class="cancel-btn" onclick="handleCancel()">取消</div>
    </div>
    <div class="search-tabs" id="searchTabs">
      <div class="tab-item active" data-tab="show" onclick="switchTab('show')">演出</div>
      <div class="tab-item" data-tab="venue" onclick="switchTab('venue')">场馆</div>

</div>

// 场馆数据（由演出数据汇总）
const venueData = [
  { name: '三亚海棠湾演艺中心', area: '三亚·海棠湾', shows: 1, image: 'https://picsum.photos/seed/venue-haitang/160/160' },
  { name: '海口湾演艺中心大剧场', area: '海口·湾区', shows: 2, image: 'https://picsum.photos/seed/venue-haikouwan/160/160' },
  { name: '海南省歌舞剧院', area: '海口·国兴大道', shows: 2, image: 'https://picsum.photos/seed/venue-hainanopera/160/160' },
  { name: '海口观澜湖新城剧场', area: '海口·观澜湖', shows: 1, image: 'https://picsum.photos/seed/venue-guanlanhu/160/160' },
  { name: '三亚亚特兰蒂斯剧场', area: '三亚·亚特兰蒂斯', shows: 1, image: 'https://picsum.photos/seed/venue-atlantis/160/160' },
  { name: '三亚天涯海角沙滩赛场', area: '三亚·天涯海角', shows: 1, image: 'https://picsum.photos/seed/venue-tianya/160/160' },
  { name: '三亚大东海沙滩舞台', area: '三亚·大东海', shows: 1, image: 'https://picsum.photos/seed/venue-dadonghai/160/160' },

// 商品数据（与 shop.html 同源）
const productSearchData = [
  { id: 1, name: '《海之梦》演出限定纪念T恤', cat: 'derivative', catName: '演出衍生品', price: 128, originalPrice: 199, tag: 'hot', tagText: '热卖', image: 'hainan-tee1', sales: 2860 },
  { id: 4, name: '演艺之星水晶音乐盒', cat: 'gift', catName: '定制礼品', price: 268, originalPrice: 399, tag: 'hot', tagText: '热卖', image: 'hainan-musicbox1', sales: 650 },
  { id: 5, name: '海南风情系列手机壳', cat: 'fashion', catName: '服饰配件', price: 49, originalPrice: 79, tag: 'new', tagText: '新品', image: 'hainan-case1', sales: 3200 },
  { id: 8, name: '《椰林交响》演出原声CD', cat: 'derivative', catName: '演出衍生品', price: 68, originalPrice: 98, tag: 'hot', tagText: '热卖', image: 'hainan-cd1', sales: 760 },
  { id: 9, name: '演艺主题马克杯 陶瓷杯', cat: 'cultural', catName: '文创周边', price: 59, tag: '', tagText: '', image: 'hainan-mug1', sales: 2100 }
];

// 各 tab 的热门搜索词
const hotSearchMap = {
  show: ['音乐节','三亚','演唱会','芭蕾','脱口秀','亲子','冰雪奇缘','爵士','话剧','钢琴'],
  venue: ['三亚','海口','海棠湾','演艺中心','歌舞剧院','观澜湖','亚特兰蒂斯','大东海','会展中心','天涯海角'],
  product: ['T恤','帆布包','明信片','香薰蜡烛','CD','马克杯','丝巾','徽章','手机壳','音乐盒']
};

// 各 tab 的输入框提示
const placeholderMap = {
  show: '搜索演出、场馆、商品',
  venue: '搜索场馆名称、地区',
  product: '搜索周边商品、文创好物'
};

// 各 tab 的空状态文案
const emptyTextMap = {
  show: { title: '未找到相关演出', desc: '换个关键词试试吧' },
  venue: { title: '未找到相关场馆', desc: '换个关键词试试吧' },
  product: { title: '未找到相关商品', desc: '换个关键词试试吧' }
};

// ========== DOM ==========
const searchInput = document.getElementById('searchInput');
const searchWrap = document.getElementById('searchWrap');
const clearBtn = document.getElementById('clearBtn');
const suggestionPanel = document.getElementById('suggestionPanel');
const defaultContent = document.getElementById('defaultContent');
const historySection = document.getElementById('historySection');
const historyTags = document.getElementById('historyTags');
const hotList = document.getElementById('hotList');
const searchResults = document.getElementById('searchResults');
const resultsList = document.getElementById('resultsList');
const resultsCount = document.getElementById('resultsCount');
const emptyState = document.getElementById('emptyState');
const pageWrapper = document.getElementById('pageWrapper');

let currentKeyword = '';
let currentTab = 'show';

// ========== History ==========
const HISTORY_KEY = 'search_history';
const MAX_HISTORY = 10;

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch(e) { return []; }
}

function saveHistory(keyword) {
  if (!keyword.trim()) return;
  let h = getHistory().filter(i => i !== keyword);
  h.unshift(keyword);
  if (h.length > MAX_HISTORY) h = h.slice(0, MAX_HISTORY);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}

function removeHistory(keyword) {
  const h = getHistory().filter(i => i !== keyword);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  renderHistory();
}

function clearAllHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
  showToast('搜索历史已清空');
}

function renderHistory() {
  const h = getHistory();
  if (!h.length) { historySection.style.display = 'none'; return; }
  historySection.style.display = 'block';
  historyTags.innerHTML = h.map(item =>
    '<div class="history-tag" onclick="searchByKeyword(\'' + esc(item) + '\')">' +
      '<span class="tag-text">' + esc(item) + '</span>' +
      '<span class="tag-delete" onclick="event.stopPropagation();removeHistory(\'' + esc(item) + '\')">' +
        '<i class="fas fa-times"></i>' +
      '</span>' +
    '</div>'
  ).join('');
}

// ========== Hot Search ==========
function renderHotSearch() {
  var words = hotSearchMap[currentTab] || hotSearchMap.show;
  hotList.innerHTML = words.map(function(word, i) {
    var cls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    return '<li class="hot-item" onclick="searchByKeyword(\'' + esc(word) + '\')">' +
      '<span class="hot-rank ' + cls + '">' + (i + 1) + '</span>' +
      '<span class="hot-word">' + esc(word) + '</span>' +
    '</li>';
  }).join('');
}

// ========== Search ==========
function searchByKeyword(keyword) {
  keyword = keyword.trim();
  if (!keyword) return;
  searchInput.value = keyword;
  currentKeyword = keyword;
  clearBtn.classList.add('visible');
  hideSuggestions();
  saveHistory(keyword);
  performSearch(keyword);
}

function switchTab(tab) {
  if (currentTab === tab) return;
  currentTab = tab;
  hideSuggestions();
  // 更新 tab 高亮
  var tabs = document.querySelectorAll('.search-tabs .tab-item');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].dataset.tab === tab);
  }
  // 更新输入框提示
  searchInput.setAttribute('placeholder', placeholderMap[tab] || '搜索');
  // 更新热门搜索
  renderHotSearch();
  // 更新空状态文案
  var et = emptyTextMap[tab] || emptyTextMap.show;
  emptyState.querySelector('.empty-title').textContent = et.title;
  emptyState.querySelector('.empty-desc').textContent = et.desc;
  // 切换后：有输入则在新 tab 内重新搜索，否则回到默认页
  var kw = searchInput.value.trim();
  if (kw) {
    currentKeyword = kw;
    performSearch(kw);
  } else {
    currentKeyword = '';
    resetToDefault();
  }
}

function performSearch(keyword) {
  var kw = keyword.toLowerCase();
  var results = [];
  var unitText = '个相关演出';

  if (currentTab === 'show') {
    results = showData.filter(function(s) {
      return s.name.toLowerCase().indexOf(kw) !== -1 ||
             s.type.toLowerCase().indexOf(kw) !== -1;
    });
    unitText = '个相关演出';
  } else if (currentTab === 'venue') {
    results = venueData.filter(function(v) {
      return v.name.toLowerCase().indexOf(kw) !== -1 ||
             v.area.toLowerCase().indexOf(kw) !== -1;
    });
    unitText = '个相关场馆';
  } else if (currentTab === 'product') {
    results = productSearchData.filter(function(p) {
      return p.name.toLowerCase().indexOf(kw) !== -1 ||
             p.catName.toLowerCase().indexOf(kw) !== -1 ||
             p.cat.toLowerCase().indexOf(kw) !== -1;
    });
    unitText = '件相关商品';
  }

  defaultContent.style.display = 'none';
  emptyState.classList.remove('visible');
  searchResults.classList.remove('visible');

  if (results.length > 0) {
    searchResults.classList.add('visible');
    resultsCount.innerHTML = '找到 <strong>' + results.length + '</strong> ' + unitText;
    if (currentTab === 'show') {
      renderShowResults(results);
    } else if (currentTab === 'venue') {
      renderVenueResults(results);
    } else {
      renderProductResults(results);
    }
  } else {
    emptyState.classList.add('visible');
  }
}

function renderShowResults(results) {
  resultsList.innerHTML = results.map(function(show, idx) {
    var badgeHtml = show.badge ? '<span class="tag-badge ' + show.badge + '">' + show.badgeText + '</span>' : '';
    var labelsHtml = show.labels.map(function(l) {
      return '<span class="label ' + l.cls + '">' + l.text + '</span>';
    }).join('');
    var delay = idx * 50;

    return '<div class="show-card" style="animation-delay:' + delay + 'ms" onclick="location.href=\'show-detail.html?id=' + show.id + '\'">' +
      '<div class="cover">' +
        '<img src="' + show.image + '" alt="' + esc(show.name) + '">' +
        badgeHtml +
      '</div>' +
      '<div class="info">' +
        '<div>' +
          '<div class="name">' + highlight(show.name, currentKeyword) + '</div>' +
          '<div class="type-tag"><i class="fas ' + show.typeIcon + '"></i> ' + show.type + '</div>' +
          '<div class="venue"><i class="fas fa-map-marker-alt"></i> ' + show.venue + '</div>' +
          '<div class="datetime"><i class="far fa-calendar"></i> ' + show.date + '</div>' +
        '</div>' +
        '<div class="bottom-row">' +
          '<div class="price"><span>&yen;</span>' + show.price + '<span>起</span></div>' +
          '<div class="labels">' + labelsHtml + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderProductResults(results) {
  resultsList.innerHTML = results.map(function(p, idx) {
    var badgeHtml = p.tag ? '<span class="tag-badge ptag-' + p.tag + '">' + esc(p.tagText) + '</span>' : '';
    var imgSrc = 'https://picsum.photos/seed/' + p.image + '/200/200';

    // 价格区块：积分+现金 / 纯积分兑换 / 纯现金
    var priceHtml = '';
    if (p.points && p.points > 0 && p.price > 0) {
      priceHtml = '<span class="points-price"><span class="symbol">' + p.points + '积分 +</span>&yen;' + p.price + '</span>';
    } else if (p.points && p.points > 0) {
      priceHtml = '<span class="points-price">' + p.points + '<span class="symbol">积分</span></span>';
    } else {
      priceHtml = '<span class="price"><span class="symbol">&yen;</span>' + p.price + '</span>';
    }
    var origHtml = (p.originalPrice && p.originalPrice > 0 && p.price > 0)
      ? '<span class="original-price">&yen;' + p.originalPrice + '</span>' : '';

    var salesText = p.sales >= 1000 ? (p.sales / 1000).toFixed(1) + 'k' : p.sales;
    var delay = idx * 50;

    return '<div class="product-card-h" style="animation-delay:' + delay + 'ms" onclick="location.href=\'shop.html?id=' + p.id + '\'">' +
      '<div class="cover">' +
        '<img src="' + imgSrc + '" alt="' + esc(p.name) + '">' +
        badgeHtml +
      '</div>' +
      '<div class="info">' +
        '<div>' +
          '<div class="name">' + highlight(p.name, currentKeyword) + '</div>' +
          '<div class="cat-tag"><i class="fas fa-tag"></i> ' + esc(p.catName) + '</div>' +
        '</div>' +
        '<div class="bottom-row">' +
          '<div class="price-block">' + priceHtml + origHtml + '</div>' +
          '<div class="sales">已售 ' + salesText + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderVenueResults(results) {
  resultsList.innerHTML = results.map(function(v, idx) {
    var delay = idx * 50;
    return '<div class="venue-card" style="animation-delay:' + delay + 'ms" onclick="location.href=\'theater-list.html?kw=' + encodeURIComponent(v.name) + '\'">' +
      '<div class="cover">' +
        '<img src="' + v.image + '" alt="' + esc(v.name) + '">' +
        '<div class="v-icon"><i class="fas fa-building-columns"></i></div>' +
      '</div>' +
      '<div class="info">' +
        '<div class="name">' + highlight(v.name, currentKeyword) + '</div>' +
        '<div class="area"><i class="fas fa-map-marker-alt"></i> ' + esc(v.area) + '</div>' +
        '<div class="meta"><i class="fas fa-theater-masks"></i> 在演 <span class="shows-count">' + v.shows + ' 场演出</span></div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function highlight(text, keyword) {
  if (!keyword) return esc(text);
  var safe = esc(text);
  var kwSafe = esc(keyword).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp('(' + kwSafe + ')', 'gi'), '<em>$1</em>');
}

// ========== Suggestions ==========
function showSuggestions(keyword) {
  if (!keyword.trim()) { hideSuggestions(); return; }
  var kw = keyword.toLowerCase();
  var matches = [];
  var subField = '';

  if (currentTab === 'show') {
    matches = showData.filter(function(s) {
      return s.name.toLowerCase().indexOf(kw) !== -1;
    }).slice(0, 5);
    subField = 'type';
  } else if (currentTab === 'venue') {
    matches = venueData.filter(function(v) {
      return v.name.toLowerCase().indexOf(kw) !== -1 ||
             v.area.toLowerCase().indexOf(kw) !== -1;
    }).slice(0, 5);
    subField = 'area';
  } else if (currentTab === 'product') {
    matches = productSearchData.filter(function(p) {
      return p.name.toLowerCase().indexOf(kw) !== -1 ||
             p.catName.toLowerCase().indexOf(kw) !== -1;
    }).slice(0, 5);
    subField = 'catName';
  }

  if (!matches.length) { hideSuggestions(); return; }

  suggestionPanel.innerHTML = matches.map(function(item) {
    var subText = '';
    if (subField === 'type') subText = item.type;
    else if (subField === 'area') subText = item.area;
    else if (subField === 'catName') subText = item.catName;
    return '<div class="suggestion-item" onclick="searchByKeyword(\'' + esc(item.name) + '\')">' +
      '<i class="fas fa-search"></i>' +
      '<span class="suggestion-text">' + highlight(item.name, keyword) + '</span>' +
      '<span class="suggestion-type">' + esc(subText) + '</span>' +
    '</div>';
  }).join('');
  suggestionPanel.classList.add('visible');
}

function hideSuggestions() {
  suggestionPanel.classList.remove('visible');
}

// ========== Input Events ==========
searchInput.addEventListener('input', function() {
  var val = this.value;
  clearBtn.classList.toggle('visible', val.length > 0);
  if (val.trim()) {
    showSuggestions(val);
  } else {
    hideSuggestions();
    resetToDefault();
  }
});

searchInput.addEventListener('focus', function() {
  searchWrap.classList.add('focused');
  if (this.value.trim()) showSuggestions(this.value);
});

searchInput.addEventListener('blur', function() {
  searchWrap.classList.remove('focused');
  setTimeout(hideSuggestions, 200);
});

searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    var val = this.value.trim();
    if (val) searchByKeyword(val);
  }
});

// ========== Clear & Cancel ==========
function clearInput() {
  searchInput.value = '';
  clearBtn.classList.remove('visible');
  hideSuggestions();
  resetToDefault();
  searchInput.focus();
}

function handleCancel() {
  if (searchInput.value.trim()) {
    clearInput();
  } else {
    goBack('home.html');
  }
}

function resetToDefault() {
  currentKeyword = '';
  defaultContent.style.display = 'block';
  searchResults.classList.remove('visible');
  emptyState.classList.remove('visible');
  renderHistory();
}

// ========== Utility ==========
function esc(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2000);
}

pageWrapper.addEventListener('click', function(e) {
