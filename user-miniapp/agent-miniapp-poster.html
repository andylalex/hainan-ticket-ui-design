<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分享海报 - 代理中心</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
    background: #E8E8ED;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }

  .phone-frame {
    width: 375px;
    min-height: 100vh;
    background: #F5F6FA;
    position: relative;
    overflow-x: hidden;
    padding-bottom: 24px;
  }

  /* ========== 状态栏 ========== */
  .status-bar {
    height: 44px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 14px;
    font-weight: 600;
    color: #1A1A1A;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .status-bar .time { font-size: 15px; font-weight: 700; }

  .status-bar .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }

  .status-bar .status-icons i { font-size: 14px; }

  .status-bar .battery {
    width: 24px;
    height: 11px;
    border: 1.5px solid #1A1A1A;
    border-radius: 2px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 1.5px;
  }

  .status-bar .battery::after {
    content: '';
    position: absolute;
    right: -4px;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 5px;
    background: #1A1A1A;
    border-radius: 0 1px 1px 0;
  }

  .status-bar .battery-inner {
    width: 75%;
    height: 100%;
    background: #1A1A1A;
    border-radius: 1px;
  }

  /* ========== 导航栏 ========== */
  .nav-bar {
    height: 44px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    position: sticky;
    top: 44px;
    z-index: 100;
    border-bottom: 0.5px solid #F0F0F0;
  }

  .nav-bar .nav-back {
    position: absolute;
    left: 16px;
    width: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #1A1A1A;
    font-size: 18px;
    transition: opacity 0.2s;
  }

  .nav-bar .nav-back:active { opacity: 0.5; }

  .nav-bar .nav-title {
    font-size: 17px;
    font-weight: 600;
    color: #1A1A1A;
  }

  /* ========== 海报预览 ========== */
  .poster-preview {
    margin: 16px;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
  }

  .poster-card {
    width: 100%;
    height: 560px;
    background: #fff;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .poster-cover {
    width: 100%;
    height: 260px;
    background: linear-gradient(135deg, #FF6B4A, #FF9A76, #FFB899);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .poster-cover-icon {
    font-size: 48px;
    color: rgba(255,255,255,0.9);
  }

  .poster-cover-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(0,0,0,0.4);
    color: #fff;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    font-weight: 500;
  }

  .poster-content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .poster-info {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .poster-title {
    font-size: 20px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.3;
  }

  .poster-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .poster-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #666;
  }

  .poster-meta-row i {
    width: 16px;
    color: #94A3B8;
    font-size: 13px;
  }

  .poster-price {
    font-size: 22px;
    font-weight: 700;
    color: #FF6B4A;
    margin-top: 4px;
  }

  .poster-price .unit {
    font-size: 13px;
    font-weight: 500;
  }

  .poster-agent-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 12px;
    border-top: 1px solid #F1F5F9;
  }

  .poster-agent-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D4A853, #F0D78C);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .poster-agent-name {
    font-size: 13px;
    font-weight: 600;
    color: #1A1A1A;
  }

  .poster-agent-desc {
    font-size: 11px;
    color: #94A3B8;
  }

  .poster-qrcode-mini {
    width: 48px;
    height: 48px;
    background: #F5F6FA;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: auto;
    flex-shrink: 0;
  }

  .poster-qrcode-mini i {
    font-size: 24px;
    color: #C0C4CC;
  }

  /* ========== 海报选择 ========== */
  .poster-select {
    margin: 16px 16px 0;
  }

  .poster-select-label {
    font-size: 14px;
    font-weight: 600;
    color: #1A1A1A;
    margin-bottom: 12px;
  }

  .poster-thumbnails {
    display: flex;
    gap: 10px;
  }

  .poster-thumb {
    flex: 1;
    height: 100px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid transparent;
    position: relative;
  }

  .poster-thumb.active {
    border-color: #FF6B4A;
  }

  .poster-thumb:active { opacity: 0.8; }

  .poster-thumb.t1 { background: linear-gradient(135deg, #FF6B4A, #FF9A76); }
  .poster-thumb.t2 { background: linear-gradient(135deg, #4A90D9, #76B5FF); }
  .poster-thumb.t3 { background: linear-gradient(135deg, #9B6BFF, #C49BFF); }

  .poster-thumb i {
    font-size: 24px;
    color: rgba(255,255,255,0.9);
  }

  .poster-thumb-name {
    position: absolute;
    bottom: 6px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    color: #fff;
    font-weight: 500;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  }

  /* ========== 操作按钮 ========== */
  .action-buttons {
    display: flex;
    gap: 12px;
    margin: 20px 16px;
  }

  .btn-action {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.2s;
  }

  .btn-action:active { opacity: 0.8; }

  .btn-save {
    background: #FF6B4A;
    color: #fff;
  }

  .btn-share {
    background: #fff;
    color: #FF6B4A;
    border: 1px solid #FF6B4A;
  }

    
    
    
    
    
  </style>
</head>
<body>

<div class="phone-frame">

  <!-- 状态栏 -->
  <div class="status-bar">
    
    <span class="time">9:41</span>
    <div class="status-icons">
      <i class="fas fa-signal"></i>
      <i class="fas fa-wifi"></i>
      <div class="battery"><div class="battery-inner"></div></div>
    </div>
  </div>

  <!-- 导航栏 -->
  <div class="nav-bar">
    <div class="nav-back" onclick="history.back()"><i class="fas fa-chevron-left"></i></div>
    <span class="nav-title">分享海报</span>
  </div>

  <!-- 海报预览 -->
  <div class="poster-preview">
    <div class="poster-card" id="posterCard">
      <!-- 封面图 -->
      <div class="poster-cover" id="posterCover">
        <i class="fas fa-masks-theater poster-cover-icon" id="posterIcon"></i>
        <span class="poster-cover-badge">佣金 10%</span>
      </div>

      <!-- 内容区 -->
      <div class="poster-content">
        <div class="poster-info">
          <div class="poster-title" id="posterTitle">《天涯海角》大型歌舞秀</div>
          <div class="poster-meta">
            <div class="poster-meta-row">
              <i class="fas fa-calendar"></i>
              <span id="posterTime">2026.04.25 - 05.31</span>
            </div>
            <div class="poster-meta-row">
              <i class="fas fa-location-dot"></i>
              <span id="posterVenue">海南大剧院</span>
            </div>
          </div>
          <div class="poster-price"><span class="unit">&yen;</span><span id="posterPrice">180</span>起</div>
        </div>

        <!-- 代理信息条 -->
        <div class="poster-agent-bar">
          <div class="poster-agent-avatar">王</div>
          <div>
            <div class="poster-agent-name">王建华</div>
            <div class="poster-agent-desc">金牌代理 · 扫码购票享优惠</div>
          </div>
          <div class="poster-qrcode-mini">
            <i class="fas fa-qrcode"></i>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 海报选择 -->
  <div class="poster-select">
    <div class="poster-select-label">选择推广演出</div>
    <div class="poster-thumbnails">
      <div class="poster-thumb t1 active" onclick="selectPoster(0)">
        <i class="fas fa-masks-theater"></i>
        <span class="poster-thumb-name">天涯海角</span>
      </div>
      <div class="poster-thumb t2" onclick="selectPoster(1)">
        <i class="fas fa-music"></i>
        <span class="poster-thumb-name">椰风海韵</span>
      </div>
      <div class="poster-thumb t3" onclick="selectPoster(2)">
        <i class="fas fa-wand-magic-sparkles"></i>
        <span class="poster-thumb-name">南海奇缘</span>
      </div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="action-buttons">
    <button class="btn-action btn-save" onclick="showToast('海报已保存到相册')">
      <i class="fas fa-download"></i> 保存海报
    </button>
    <button class="btn-action btn-share" onclick="showToast('分享功能开发中')">
      <i class="fas fa-share-nodes"></i> 分享好友
    </button>
  </div>

</div>

<script>
  var posters = [
    {
      title: '《天涯海角》大型歌舞秀',
      time: '2026.04.25 - 05.31',
      venue: '海南大剧院',
      price: '180',
      icon: 'fas fa-masks-theater',
      gradient: 'linear-gradient(135deg, #FF6B4A, #FF9A76)',
      badge: '佣金 10%'
    },
    {
      title: '《椰风海韵》情景音乐会',
      time: '2026.04.28 - 05.15',
      venue: '三亚艺术中心',
      price: '150',
      icon: 'fas fa-music',
      gradient: 'linear-gradient(135deg, #4A90D9, #76B5FF)',
      badge: '佣金 8%'
    },
    {
      title: '《南海奇缘》儿童剧',
      time: '2026.05.01 - 05.20',
      venue: '海口大剧院',
      price: '120',
      icon: 'fas fa-wand-magic-sparkles',
      gradient: 'linear-gradient(135deg, #9B6BFF, #C49BFF)',
      badge: '佣金 12%'
    }
  ];

  function selectPoster(index) {
    var p = posters[index];
    document.getElementById('posterTitle').textContent = p.title;
    document.getElementById('posterTime').textContent = p.time;
    document.getElementById('posterVenue').textContent = p.venue;
    document.getElementById('posterPrice').textContent = p.price;
    document.getElementById('posterCover').style.background = p.gradient;
    document.getElementById('posterIcon').className = p.icon + ' poster-cover-icon';
    document.querySelector('.poster-cover-badge').textContent = p.badge;

    document.querySelectorAll('.poster-thumb').forEach(function(t, i) {
      t.classList.toggle('active', i === index);
    });
  }

  function showToast(msg) {
    var toast = document.createElement('div');
    toast.textContent = msg;
    toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.75);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;pointer-events:none;';
    document.body.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 2000);
  }
</script>

</body>
</html>
