<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>海南演艺票务系统 - 演出剧院</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ========== Reset & Base ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #F5F6FA;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ========== Page Container ========== */
    .page-container {
      width: 100%;
      max-width: 375px;
      min-height: 100vh;
      min-height: 100dvh;
      background: #F5F6FA;
      position: relative;
      overflow-x: hidden;
    }

    /* ========== Top Navigation Bar ========== */
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      background: linear-gradient(135deg, #0A1628 0%, #132744 50%, #0A1628 100%);
      padding: 0 16px;
      box-shadow: 0 2px 12px rgba(10,22,40,0.15);
    }

    .nav-back {
      position: absolute;
      left: 16px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.2s;
      text-decoration: none;
    }

    .nav-back:active {
      background: rgba(255,255,255,0.1);
    }

    .nav-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    /* ========== City Filter Bar ========== */
    .city-filter {
      background: #fff;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(10,22,40,0.06);
      position: sticky;
      top: 48px;
      z-index: 90;
    }

    .city-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .city-scroll::-webkit-scrollbar {
      display: none;
    }

    .city-tag {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      background: #F0F1F5;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1.5px solid transparent;
      white-space: nowrap;
    }

    .city-tag:active {
      transform: scale(0.95);
    }

    .city-tag.active {
      background: linear-gradient(135deg, #FF6B4A, #FF8F6B);
      color: #fff;
      box-shadow: 0 2px 10px rgba(255,107,74,0.3);
      border-color: transparent;
    }

    /* ========== Theater List ========== */
    .theater-list {
      padding: 12px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ========== Theater Card ========== */
    .theater-card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(10,22,40,0.06);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.35s ease;
      animation: cardFadeIn 0.4s ease-out forwards;
    }

    .theater-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(10,22,40,0.1);
    }

    .theater-card:active {
      transform: scale(0.98);
    }

    .theater-card.hidden {
      display: none;
    }

    .theater-card.fade-out {
      opacity: 0;
      transform: translateY(8px);
    }

    .theater-card.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes cardFadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Card Cover Image */
    .card-cover {
      width: 100%;
      height: 140px;
      position: relative;
      overflow: hidden;
    }

    .card-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .theater-card:hover .card-cover img {
      transform: scale(1.05);
    }

    /* Bottom gradient overlay on image */
    .card-cover::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: linear-gradient(to top, rgba(10,22,40,0.7) 0%, rgba(10,22,40,0.3) 40%, transparent 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* City location tag (glassmorphism) */
    .card-city-tag {
      position: absolute;
      bottom: 10px;
      left: 12px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 4px 10px;
      border-radius: 14px;
    }

    .card-city-tag i {
      font-size: 9px;
      color: #FF6B4A;
    }

    /* Theater name overlay on image */
    .card-name-overlay {
      position: absolute;
      bottom: 10px;
      right: 12px;
      z-index: 2;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      max-width: 60%;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Card Info Area */
    .card-info {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Address row */
    .card-address {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }

    .card-address i {
      font-size: 11px;
      color: #bbb;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .card-address span {
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    /* Schedule tag row */
    .card-schedule {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .schedule-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #FF6B4A;
      background: linear-gradient(135deg, rgba(255,107,74,0.1), rgba(255,107,74,0.05));
      padding: 4px 10px;
      border-radius: 12px;
    }

    .schedule-tag i {
      font-size: 10px;
    }

    /* Bottom row: seats + arrow */
    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      border-top: 1px solid rgba(10,22,40,0.05);
    }

    .card-seats {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #888;
    }

    .card-seats i {
      font-size: 13px;
      color: #D4A853;
    }

    .card-seats .seat-count {
      font-weight: 600;
      color: #555;
    }

    .card-arrow {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #F5F6FA;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #999;
      transition: all 0.25s ease;
    }

    .theater-card:hover .card-arrow {
      background: linear-gradient(135deg, #FF6B4A, #FF8F6B);
      color: #fff;
      box-shadow: 0 2px 8px rgba(255,107,74,0.3);
    }

    /* ========== Empty State ========== */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: #bbb;
    }

    .empty-state.show {
      display: flex;
    }

    .empty-state i {
      font-size: 48px;
      color: #ddd;
      margin-bottom: 16px;
    }

    .empty-state .empty-text {
      font-size: 14px;
      color: #aaa;
    }

    /* ========== Toast ========== */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(10,22,40,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: #fff;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      max-width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    /* ========== Animations ========== */
    .delay-1 { animation-delay: 0.05s; opacity: 0; }
    .delay-2 { animation-delay: 0.1s; opacity: 0; }
    .delay-3 { animation-delay: 0.15s; opacity: 0; }
    .delay-4 { animation-delay: 0.2s; opacity: 0; }
    .delay-5 { animation-delay: 0.25s; opacity: 0; }
  </style>
</head>
<body>

<div class="page-container">

  <!-- Top Navigation Bar -->
  <div class="nav-bar">
    <a class="nav-back" href="home.html" onclick="window.location.href='home.html'">
      <i class="fas fa-chevron-left"></i>
    </a>
    <span class="nav-title">演出剧院</span>
  </div>

  <!-- Theater List -->
  <div class="theater-list" id="theaterList">

    <!-- Theater 1: 海南大剧院 -->
    <div class="theater-card delay-1" data-city="海口" onclick="window.location.href='theater-detail.html'" style="cursor:pointer;">
      <div class="card-cover">

        <div class="card-name-overlay">海南大剧院</div>
      </div>

        </div>

          <span class="schedule-tag"><i class="far fa-calendar-alt"></i> 4场演出</span>

        <div class="card-bottom">
          <div class="card-seats">

          </div>

    </div>

    <!-- Theater 2: 三亚艺术中心 -->
    <div class="theater-card delay-2" data-city="三亚" onclick="window.location.href='theater-detail.html'" style="cursor:pointer;">
      <div class="card-cover">
        <img src="https://picsum.photos/seed/sanya-art-center/750/280.jpg" alt="三亚艺术中心">
        <div class="card-city-tag"><i class="fas fa-map-marker-alt"></i> 三亚</div>
        <div class="card-name-overlay">三亚艺术中心</div>
      </div>
      <div class="card-info">
        <div class="card-address">
          <i class="fas fa-location-dot"></i>
          <span>三亚市吉阳区迎宾路188号</span>
        </div>
        <div class="card-schedule">
          <span class="schedule-tag"><i class="far fa-calendar-alt"></i> 3场演出</span>
        </div>
        <div class="card-bottom">
          <div class="card-seats">
            <i class="fas fa-couch"></i>
            <span class="seat-count">1200座</span>
          </div>
          <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
        </div>
      </div>
    </div>

    <!-- Theater 3: 海口演艺中心 -->
    <div class="theater-card delay-3" data-city="海口" onclick="window.location.href='theater-detail.html'" style="cursor:pointer;">
      <div class="card-cover">
        <img src="https://picsum.photos/seed/haikou-performing/750/280.jpg" alt="海口演艺中心">
        <div class="card-city-tag"><i class="fas fa-map-marker-alt"></i> 海口</div>
        <div class="card-name-overlay">海口演艺中心</div>
      </div>
      <div class="card-info">
        <div class="card-address">
          <i class="fas fa-location-dot"></i>
          <span>海口市美兰区海府路16号</span>
        </div>
        <div class="card-schedule">
          <span class="schedule-tag"><i class="far fa-calendar-alt"></i> 2场演出</span>
        </div>
        <div class="card-bottom">
          <div class="card-seats">
            <i class="fas fa-couch"></i>
            <span class="seat-count">800座</span>
          </div>
          <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
        </div>
      </div>
    </div>

    <!-- Theater 4: 万宁海滨剧场 -->
    <div class="theater-card delay-4" data-city="万宁" onclick="window.location.href='theater-detail.html'" style="cursor:pointer;">
      <div class="card-cover">
        <img src="https://picsum.photos/seed/wanning-sea-theater/750/280.jpg" alt="万宁海滨剧场">
        <div class="card-city-tag"><i class="fas fa-map-marker-alt"></i> 万宁</div>
        <div class="card-name-overlay">万宁海滨剧场</div>
      </div>
      <div class="card-info">
        <div class="card-address">
          <i class="fas fa-location-dot"></i>
          <span>万宁市万城镇滨海大道1号</span>
        </div>
        <div class="card-schedule">
          <span class="schedule-tag"><i class="far fa-calendar-alt"></i> 5场演出</span>
        </div>
        <div class="card-bottom">
          <div class="card-seats">
            <i class="fas fa-couch"></i>
            <span class="seat-count">2400座</span>
          </div>
          <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
        </div>
      </div>
    </div>

    <!-- Theater 5: 儋州文化广场 -->
    <div class="theater-card delay-5" data-city="儋州" onclick="window.location.href='theater-detail.html'" style="cursor:pointer;">
      <div class="card-cover">
        <img src="https://picsum.photos/seed/danzhou-culture-plaza/750/280.jpg" alt="儋州文化广场">
        <div class="card-city-tag"><i class="fas fa-map-marker-alt"></i> 儋州</div>
        <div class="card-name-overlay">儋州文化广场</div>
      </div>
      <div class="card-info">
        <div class="card-address">
          <i class="fas fa-location-dot"></i>
          <span>儋州市那大镇中兴大道30号</span>
        </div>
        <div class="card-schedule">
          <span class="schedule-tag"><i class="far fa-calendar-alt"></i> 2场演出</span>
        </div>
        <div class="card-bottom">
          <div class="card-seats">
            <i class="fas fa-couch"></i>
            <span class="seat-count">600座</span>
          </div>
          <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState">
    <i class="far fa-building"></i>
    <div class="empty-text">暂无该城市的合作剧院</div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ========== City Filter ==========
  const cityTags = document.querySelectorAll('.city-tag');
  const theaterCards = document.querySelectorAll('.theater-card');
  const emptyState = document.getElementById('emptyState');
  let currentCity = 'all';

  cityTags.forEach(tag => {
    tag.addEventListener('click', () => {
      const city = tag.dataset.city;
      if (city === currentCity) return;
      currentCity = city;

      // Update active tag
      cityTags.forEach(t => t.classList.remove('active'));
      tag.classList.add('active');

      // Filter cards with fade animation
      filterTheaters(city);
    });
  });

  function filterTheaters(city) {
    let visibleCount = 0;

    theaterCards.forEach((card, index) => {
      const cardCity = card.dataset.city;
      const shouldShow = city === 'all' || cardCity === city;

      if (shouldShow) {
        visibleCount++;
        // Fade out first, then show
        card.classList.add('fade-out');
        card.classList.remove('fade-in');

        setTimeout(() => {
          card.classList.remove('hidden', 'fade-out');
          card.classList.add('fade-in');
        }, 150 + index * 60);
      } else {
        // Fade out then hide
        card.classList.add('fade-out');
        card.classList.remove('fade-in');

        setTimeout(() => {
          card.classList.add('hidden');
          card.classList.remove('fade-out');
        }, 250);
      }
    });

    // Show/hide empty state
    setTimeout(() => {
      if (visibleCount === 0) {
        emptyState.classList.add('show');
      } else {
        emptyState.classList.remove('show');
      }
    }, 300);
  }

  // ========== Card Click ==========
  function handleCardClick(card) {
    const name = card.querySelector('.card-name-overlay').textContent;
    showToast('即将跳转到' + name + '详情');
  }

  // ========== Toast ==========
  let toastTimer;

  function showToast(message) {
    const toast = document.getElementById('toast');
    clearTimeout(toastTimer);
    toast.textContent = message;
    toast.classList.add('show');

    toastTimer = setTimeout(() => {
      toast.classList.remove('show');
    }, 1800);
  }
</script>

</body>
