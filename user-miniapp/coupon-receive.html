<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>领取优惠券</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(180deg, #FF6B4A 0%, #FF8A6A 40%, #F5F6FA 40%);
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: 375px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ========== Top Bar ========== */
    .top-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0 16px;
    }

    .top-bar .back-btn {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
      text-decoration: none;
    }

    .top-bar .back-btn:active { background: rgba(255,255,255,0.15); }
    .top-bar .nav-title { color: #fff; font-size: 17px; font-weight: 500; }

    /* ========== Coupon Card ========== */
    .coupon-receive-card {
      margin: 20px 16px 0;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(255,107,74,0.15);
      position: relative;
    }

    .coupon-receive-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #FF6B4A, #FF8A6A);
    }

    .coupon-header {
      padding: 24px 20px 16px;
      text-align: center;
      border-bottom: 1px dashed #E8EAF0;
      position: relative;
    }

    .coupon-header::before,
    .coupon-header::after {
      content: '';
      position: absolute;
      bottom: -8px;
      width: 16px;
      height: 16px;
      background: #F5F6FA;
      border-radius: 50%;
    }

    .coupon-header::before { left: -8px; }
    .coupon-header::after { right: -8px; }

    .coupon-amount-big {
      font-size: 48px;
      font-weight: 700;
      color: #FF6B4A;
      line-height: 1;
    }

    .coupon-amount-big .unit {
      font-size: 24px;
      font-weight: 500;
      margin-right: 2px;
    }

    .coupon-amount-big .desc {
      font-size: 20px;
      font-weight: 500;
    }

    .coupon-type-tag {
      display: inline-block;
      margin-top: 8px;
      padding: 2px 10px;
      background: rgba(255,107,74,0.1);
      color: #FF6B4A;
      font-size: 12px;
      border-radius: 10px;
      font-weight: 500;
    }

    .coupon-body {
      padding: 20px;
    }

    .coupon-name {
      font-size: 18px;
      font-weight: 600;
      color: #0A1628;
      text-align: center;
      margin-bottom: 16px;
    }

    .coupon-info-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .coupon-info-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .coupon-info-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: #F5F6FA;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .coupon-info-icon i {
      font-size: 12px;
      color: #8E95A9;
    }

    .coupon-info-content {
      flex: 1;
    }

    .coupon-info-label {
      font-size: 12px;
      color: #8E95A9;
      margin-bottom: 2px;
    }

    .coupon-info-value {
      font-size: 14px;
      color: #0A1628;
      font-weight: 500;
    }

    /* ========== Receive Button ========== */
    .receive-section {
      padding: 0 16px 20px;
    }

    .receive-btn {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #FF6B4A, #FF8A6A);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(255,107,74,0.3);
      transition: all 0.2s;
    }

    .receive-btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(255,107,74,0.2);
    }

    .receive-btn.received {
      background: #E8EAF0;
      color: #8E95A9;
      box-shadow: none;
      cursor: not-allowed;
    }

    .receive-btn.received i {
      color: #4CAF50;
    }

    /* ========== Rules Section ========== */
    .rules-section {
      margin: 16px;
      background: #fff;
      border-radius: 12px;
      padding: 16px;
    }

    .rules-title {
      font-size: 14px;
      font-weight: 600;
      color: #0A1628;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rules-title i {
      color: #8E95A9;
      font-size: 14px;
    }

    .rules-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .rules-item {
      font-size: 12px;
      color: #5A6178;
      line-height: 1.6;
      padding-left: 16px;
      position: relative;
    }

    .rules-item::before {
      content: '';
      position: absolute;
      left: 4px;
      top: 8px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #B0B5C3;
    }

    /* ========== Toast ========== */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 200;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Top Bar -->
    <div class="top-bar">
      <a href="home.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
      <span class="nav-title">领取优惠券</span>
    </div>

    <!-- Coupon Card -->
    <div class="coupon-receive-card">
      <div class="coupon-header">
        <div class="coupon-amount-big"><span class="unit">&yen;</span>20</div>
        <span class="coupon-type-tag">现金券</span>
      </div>
      <div class="coupon-body">
        <div class="coupon-name">满100减20优惠券</div>
        <div class="coupon-info-list">
          <div class="coupon-info-item">
            <div class="coupon-info-icon"><i class="fas fa-yen-sign"></i></div>
            <div class="coupon-info-content">
              <div class="coupon-info-label">使用门槛</div>
              <div class="coupon-info-value">订单满 &yen;100 可用</div>
            </div>
          </div>
          <div class="coupon-info-item">
            <div class="coupon-info-icon"><i class="fas fa-calendar-alt"></i></div>
            <div class="coupon-info-content">
              <div class="coupon-info-label">有效期</div>
              <div class="coupon-info-value">2026-05-01 至 2026-06-30</div>
            </div>
          </div>
          <div class="coupon-info-item">
            <div class="coupon-info-icon"><i class="fas fa-map-marker-alt"></i></div>
            <div class="coupon-info-content">
              <div class="coupon-info-label">适用范围</div>
              <div class="coupon-info-value">全场通用</div>
            </div>
          </div>
          <div class="coupon-info-item">
            <div class="coupon-info-icon"><i class="fas fa-layer-group"></i></div>
            <div class="coupon-info-content">
              <div class="coupon-info-label">叠加规则</div>
              <div class="coupon-info-value">可叠加会员折扣使用</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Receive Button -->
    <div class="receive-section">
      <button class="receive-btn" id="receiveBtn" onclick="receiveCoupon()">
        <i class="fas fa-gift"></i>
        <span id="receiveBtnText">立即领取</span>
      </button>
    </div>

    <!-- Rules -->
    <div class="rules-section">
      <div class="rules-title"><i class="fas fa-info-circle"></i> 使用规则</div>
      <div class="rules-list">
        <div class="rules-item">优惠券仅限在海南演艺票务平台使用</div>
        <div class="rules-item">每笔订单限用一张优惠券，不可与其他优惠券叠加</div>
        <div class="rules-item">优惠券过期未使用将自动失效，不予补发</div>
        <div class="rules-item">如订单发生退款，优惠券将退回账户（需在有效期内）</div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    let isReceived = false;

    function receiveCoupon() {
      if (isReceived) return;

      const btn = document.getElementById('receiveBtn');
      const btnText = document.getElementById('receiveBtnText');

      // Simulate API call
      btn.style.opacity = '0.7';
      setTimeout(() => {
        isReceived = true;
        btn.classList.add('received');
        btnText.textContent = '已领取';
        btn.innerHTML = '<i class="fas fa-check-circle"></i><span>已领取</span>';
        btn.style.opacity = '1';
        showToast('领取成功！优惠券已放入您的卡包');
      }, 600);
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
