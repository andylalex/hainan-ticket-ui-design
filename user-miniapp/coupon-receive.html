<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>领取优惠券</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F5F6FA;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .page {
      width: 375px;
      min-height: 100vh;
      background: #F5F6FA;
      position: relative;
      overflow-x: hidden;
    }

    /* ========== Banner ========== */
    .banner-wrap {
      width: 375px;
      height: 200px;
      position: relative;
      overflow: hidden;
    }

    .banner-wrap img {
      width: 375px;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .banner-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
    }

    .banner-title {
      position: absolute;
      bottom: 16px;
      left: 20px;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* ========== Back Button ========== */
    .back-btn {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      z-index: 10;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .back-btn:active { background: rgba(255,255,255,0.35); }

    /* ========== Coupon Card ========== */
    .coupon-section {
      padding: 0 16px;
      margin-top: -24px;
      position: relative;
      z-index: 2;
    }

    .coupon-card {
      width: 343px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .coupon-top {
      width: 343px;
      height: 120px;
      background: linear-gradient(135deg, #FF6B4A 0%, #FF8A6A 50%, #FFB088 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .coupon-amount {
      font-size: 56px;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .coupon-amount .unit {
      font-size: 28px;
      font-weight: 600;
    }

    .coupon-type-tag {
      margin-top: 8px;
      padding: 3px 14px;
      background: rgba(255,255,255,0.25);
      color: #fff;
      font-size: 12px;
      border-radius: 20px;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }

    /* 锯齿分隔 */
    .coupon-notch-wrap {
      width: 343px;
      height: 16px;
      position: relative;
      background: linear-gradient(135deg, #FF6B4A 0%, #FF8A6A 50%, #FFB088 100%);
    }

    .coupon-notch-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 16px;
      background: radial-gradient(circle at 8px 0, transparent 8px, #fff 8px);
      background-size: 20px 16px;
      background-position: -4px 0;
    }

    .coupon-body {
      padding: 20px 20px 16px;
    }

    .coupon-name {
      font-size: 18px;
      font-weight: 700;
      color: #0A1628;
      text-align: center;
      margin-bottom: 20px;
    }

    .info-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .info-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #FFF5F2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .info-icon i {
      font-size: 14px;
      color: #FF6B4A;
    }

    .info-text {
      flex: 1;
      padding-top: 2px;
    }

    .info-label {
      font-size: 12px;
      color: #8E95A9;
      margin-bottom: 3px;
    }

    .info-value {
      font-size: 14px;
      color: #0A1628;
      font-weight: 500;
      line-height: 1.4;
    }

    /* ========== Receive Button ========== */
    .btn-section {
      padding: 0 16px 16px;
    }

    .receive-btn {
      width: 343px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #FF6B4A, #FF8A6A);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(255,107,74,0.3);
      transition: all 0.2s;
    }

    .receive-btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(255,107,74,0.2);
    }

    .receive-btn.received {
      background: #E8EAF0;
      color: #8E95A9;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ========== Rules ========== */
    .rules-card {
      width: 343px;
      margin: 0 16px 20px;
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .rules-title {
      font-size: 14px;
      font-weight: 700;
      color: #0A1628;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rules-title i {
      color: #FF6B4A;
      font-size: 14px;
    }

    .rules-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .rules-item {
      font-size: 12px;
      color: #5A6178;
      line-height: 1.6;
      padding-left: 14px;
      position: relative;
    }

    .rules-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 7px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #FFB5A0;
    }

    /* ========== Toast ========== */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.9);
      background: rgba(0,0,0,0.78);
      color: #fff;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 200;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Banner -->
    <div class="banner-wrap">
      <img src="assets/coupon-banner.jpg" alt="优惠券">
      <div class="banner-overlay"></div>
      <div class="banner-title">🎁 专属优惠券</div>
      <a href="home.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
    </div>

    <!-- Coupon Card -->
    <div class="coupon-section">
      <div class="coupon-card">
        <div class="coupon-top">
          <div class="coupon-amount"><span class="unit">&yen;</span>20</div>
          <span class="coupon-type-tag">现金券</span>
        </div>
        <div class="coupon-notch-wrap"></div>
        <div class="coupon-body">
          <div class="coupon-name">满100减20优惠券</div>
          <div class="info-list">
            <div class="info-row">
              <div class="info-icon"><i class="fas fa-yen-sign"></i></div>
              <div class="info-text">
                <div class="info-label">使用门槛</div>
                <div class="info-value">订单满 &yen;100 可用</div>
              </div>
            </div>
            <div class="info-row">
              <div class="info-icon"><i class="fas fa-calendar-alt"></i></div>
              <div class="info-text">
                <div class="info-label">有效期</div>
                <div class="info-value">2026-05-01 至 2026-06-30</div>
              </div>
            </div>
            <div class="info-row">
              <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
              <div class="info-text">
                <div class="info-label">适用范围</div>
                <div class="info-value">全场通用</div>
              </div>
            </div>
            <div class="info-row">
              <div class="info-icon"><i class="fas fa-layer-group"></i></div>
              <div class="info-text">
                <div class="info-label">叠加规则</div>
                <div class="info-value">可叠加会员折扣使用</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Receive Button -->
    <div class="btn-section">
      <button class="receive-btn" id="receiveBtn" onclick="receiveCoupon()">
        <i class="fas fa-gift"></i>
        <span id="receiveBtnText">立即领取</span>
      </button>
    </div>

    <!-- Rules -->
    <div class="rules-card">
      <div class="rules-title"><i class="fas fa-info-circle"></i> 使用规则</div>
      <div class="rules-list">
        <div class="rules-item">优惠券仅限在海南演艺票务平台使用</div>
        <div class="rules-item">每笔订单限用一张优惠券，不可与其他优惠券叠加</div>
        <div class="rules-item">优惠券过期未使用将自动失效，不予补发</div>
        <div class="rules-item">如订单发生退款，优惠券将退回账户（需在有效期内）</div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    let isReceived = false;

    function receiveCoupon() {
      if (isReceived) return;

      const btn = document.getElementById('receiveBtn');
      const btnText = document.getElementById('receiveBtnText');

      btn.style.opacity = '0.7';
      setTimeout(() => {
        isReceived = true;
        btn.classList.add('received');
        btn.innerHTML = '<i class="fas fa-check-circle"></i><span>已领取</span>';
        btn.style.opacity = '1';
        showToast('领取成功！优惠券已放入您的卡包');
      }, 600);
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
