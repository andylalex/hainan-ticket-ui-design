<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>海南演艺票务 - 选座购票</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  /* ========== CSS Reset & Base ========== */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --deep-blue: #0A1628;
    --coral-orange: #FF6B4A;
    --gold: #D4A853;
    --emerald: #00C9A7;
    --light-gray: #F5F6FA;
    --mid-gray: #C8CCD8;
    --dark-gray: #4A4E5A;
    --sold-gray: #2A2D38;
    --seat-available: #3A3F52;
    --seat-available-hover: #4E5470;
    --seat-selected: #FF6B4A;
    --seat-vip-border: #D4A853;
    --bg-dark: #0E1A2E;
    --bg-card: rgba(15, 25, 50, 0.85);
    --text-primary: #FFFFFF;
    --text-secondary: rgba(255, 255, 255, 0.65);
    --text-muted: rgba(255, 255, 255, 0.4);
    --glass-bg: rgba(10, 22, 40, 0.72);
    --glass-border: rgba(255, 255, 255, 0.08);
  }

  html, body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a2e;
    color: var(--text-primary);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    margin: 0;
    padding: 20px 0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }

  /* ========== Phone Frame ========== */
  .phone-frame {
    width: 375px;
    height: 812px;
    margin: 0 auto;
    background: var(--bg-dark);
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.06),
      0 20px 80px rgba(0,0,0,0.6),
      0 0 120px rgba(10, 22, 40, 0.4);
    border-radius: 32px;
    transform: translateX(0);
    contain: layout;
  }

  @media (max-width: 400px) {
    html, body {
      padding: 0;
      background: #060B14;
    }
    .phone-frame {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      border-radius: 0;
      box-shadow: none;
    }
  }

  /* ========== Top Navigation ========== */
  .top-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 44px;
    padding: 0 16px;
    position: relative;
    z-index: 10;
    background: transparent;
  }

  .nav-back {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 50%;
    transition: background 0.2s;
  }

  .nav-back:active {
    background: rgba(255,255,255,0.08);
  }

  .nav-back svg {
    width: 22px;
    height: 22px;
    stroke: var(--text-primary);
    stroke-width: 2.2;
    fill: none;
  }

  .nav-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text-primary);
  }

  .nav-share {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 50%;
    transition: background 0.2s;
  }

  .nav-share:active {
    background: rgba(255,255,255,0.08);
  }

  .nav-share svg {
    width: 20px;
    height: 20px;
    stroke: var(--text-secondary);
    stroke-width: 1.8;
    fill: none;
  }

  /* ========== Event Info Bar ========== */
  .event-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px 12px;
    background: transparent;
  }

  .event-info .event-poster {
    width: 44px;
    height: 58px;
    border-radius: 6px;
    background: linear-gradient(135deg, #1a2a4a, #0d1b30);
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .event-poster .poster-icon {
    font-size: 22px;
    opacity: 0.7;
  }

  .event-info .event-detail {
    flex: 1;
    min-width: 0;
  }

  .event-info .event-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .event-info .event-meta {
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .event-info .event-meta .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  /* ========== Scrollable Content ========== */
  .scroll-content {
    height: calc(100vh - 44px - 70px);
    height: calc(100dvh - 44px - 70px);
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 20px;
  }

  .scroll-content::-webkit-scrollbar {
    display: none;
  }

  /* ========== Stage Area ========== */
  .stage-wrapper {
    padding: 8px 24px 0;
    display: flex;
    justify-content: center;
  }

  .stage {
    width: 240px;
    height: 52px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
  }

  .stage-shape {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 44px;
    border-radius: 0 0 50% 50% / 0 0 100% 100%;
    background: linear-gradient(180deg, rgba(212, 168, 83, 0.25) 0%, rgba(212, 168, 83, 0.06) 100%);
    border: 1px solid rgba(212, 168, 83, 0.2);
    border-top: none;
  }

  .stage-shape::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 10%;
    right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(212, 168, 83, 0.6), transparent);
    border-radius: 1px;
  }

  /* Stage lighting effect */
  .stage-lights {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    height: 20px;
    pointer-events: none;
  }

  .stage-lights::before,
  .stage-lights::after {
    content: '';
    position: absolute;
    top: 0;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow:
      0 0 8px 2px rgba(212, 168, 83, 0.5),
      0 0 20px 4px rgba(212, 168, 83, 0.2);
  }

  .stage-lights::before { left: 20px; }
  .stage-lights::after { right: 20px; }

  .stage-light-center {
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--coral-orange);
    box-shadow:
      0 0 10px 3px rgba(255, 107, 74, 0.4),
      0 0 30px 6px rgba(255, 107, 74, 0.15);
    animation: pulse-light 2s ease-in-out infinite;
  }

  @keyframes pulse-light {
    0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
  }

  /* Light beams */
  .light-beam {
    position: absolute;
    top: 4px;
    width: 40px;
    height: 30px;
    clip-path: polygon(45% 0%, 55% 0%, 70% 100%, 30% 100%);
    opacity: 0.08;
    pointer-events: none;
  }

  .light-beam:nth-child(1) {
    left: 30px;
    background: linear-gradient(180deg, var(--gold), transparent);
  }

  .light-beam:nth-child(2) {
    left: 110px;
    background: linear-gradient(180deg, var(--coral-orange), transparent);
  }

  .light-beam:nth-child(3) {
    right: 30px;
    background: linear-gradient(180deg, var(--gold), transparent);
  }

  .stage-label {
    position: relative;
    z-index: 1;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 6px;
    color: rgba(212, 168, 83, 0.7);
    text-transform: uppercase;
  }

  /* ========== Seat Map Container ========== */
  .seat-map-container {
    padding: 12px 8px 0;
    display: flex;
    justify-content: center;
    overflow: hidden;
  }

  .seat-map-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 0 4px;
    max-width: 375px;
  }

  .seat-map-scroll::-webkit-scrollbar {
    display: none;
  }

  .seat-map {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 4px 0;
    transform-origin: top center;
    transition: transform 0.3s ease;
  }

  .seat-row {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .row-label {
    width: 18px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    text-align: center;
    flex-shrink: 0;
    user-select: none;
  }

  .row-label-right {
    width: 18px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    text-align: center;
    flex-shrink: 0;
    user-select: none;
  }

  .seats-in-row {
    display: flex;
    gap: 4px;
  }

  /* Gap in middle for aisle */
  .seat-gap {
    width: 14px;
    flex-shrink: 0;
  }

  /* ========== Individual Seat ========== */
  .seat {
    width: 20px;
    height: 20px;
    border-radius: 5px 5px 3px 3px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    user-select: none;
    flex-shrink: 0;
  }

  .seat::before {
    content: '';
    position: absolute;
    top: 2px;
    left: 3px;
    right: 3px;
    height: 3px;
    border-radius: 2px 2px 0 0;
    opacity: 0.3;
    transition: opacity 0.2s;
  }

  /* Available seat */
  .seat.available {
    background: var(--seat-available);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .seat.available::before {
    background: rgba(255,255,255,0.3);
  }

  .seat.available:hover {
    background: var(--seat-available-hover);
    transform: scale(1.15);
    border-color: rgba(255,255,255,0.12);
  }

  .seat.available:active {
    transform: scale(0.92);
  }

  /* Sold seat */
  .seat.sold {
    background: var(--sold-gray);
    border: 1px solid rgba(255,255,255,0.02);
    cursor: not-allowed;
    opacity: 0.45;
  }

  .seat.sold::before {
    background: transparent;
  }

  /* Selected seat */
  .seat.selected {
    background: var(--seat-selected);
    border: 1.5px solid rgba(255, 107, 74, 0.6);
    box-shadow: 0 0 10px rgba(255, 107, 74, 0.3);
    animation: seat-bounce 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .seat.selected::before {
    background: rgba(255,255,255,0.4);
    opacity: 0.5;
  }

  @keyframes seat-bounce {
    0% { transform: scale(1); }
    30% { transform: scale(1.3); }
    50% { transform: scale(0.9); }
    70% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* VIP seat */
  .seat.vip {
    background: var(--seat-available);
    border: 1.5px solid var(--seat-vip-border);
    position: relative;
  }

  .seat.vip::after {
    content: '';
    position: absolute;
    top: -1px;
    right: -1px;
    width: 6px;
    height: 6px;
    border-radius: 0 4px 0 3px;
    background: var(--gold);
    opacity: 0.8;
  }

  .seat.vip::before {
    background: rgba(212, 168, 83, 0.3);
  }

  .seat.vip:hover {
    background: var(--seat-available-hover);
    transform: scale(1.15);
    box-shadow: 0 0 8px rgba(212, 168, 83, 0.2);
  }

  .seat.vip.selected {
    background: var(--seat-selected);
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(255, 107, 74, 0.3), 0 0 6px rgba(212, 168, 83, 0.2);
  }

  .seat.vip.selected::after {
    background: var(--gold);
  }

  /* ========== Legend ========== */
  .legend {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 14px 16px 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px 3px 2px 2px;
    flex-shrink: 0;
  }

  .legend-dot.available {
    background: var(--seat-available);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .legend-dot.sold {
    background: var(--sold-gray);
    opacity: 0.45;
  }

  .legend-dot.selected {
    background: var(--seat-selected);
    box-shadow: 0 0 4px rgba(255, 107, 74, 0.3);
  }

  .legend-dot.vip {
    background: var(--seat-available);
    border: 1.5px solid var(--gold);
  }

  .legend-text {
    font-size: 10px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  /* ========== Ticket Tier Selector ========== */
  .tier-section {
    padding: 12px 0 4px;
  }

  .tier-scroll {
    display: flex;
    gap: 8px;
    padding: 0 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-wrap: wrap;
  }

  .tier-scroll::-webkit-scrollbar {
    display: none;
  }

  .tier-tag {
    flex: 1 1 auto;
    min-width: fit-content;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: var(--text-secondary);
    white-space: nowrap;
    user-select: none;
    text-align: center;
    justify-content: center;
  }

  .tier-tag:active {
    transform: scale(0.95);
  }

  .tier-tag.active {
    background: linear-gradient(135deg, var(--coral-orange), #FF8A6E);
    border-color: transparent;
    color: #fff;
    font-weight: 600;
    box-shadow: 0 4px 14px rgba(255, 107, 74, 0.3);
  }

  .tier-tag .tier-price {
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 700;
    margin-left: 2px;
  }

  .tier-tag .tier-price .original-price {
    text-decoration: line-through;
    opacity: 0.5;
    font-weight: 400;
    font-size: 11px;
    margin-left: 4px;
  }

  .tier-tag .tier-badge {
    display: inline-block;
    margin-left: 4px;
    padding: 1px 5px;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 600;
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    color: #fff;
    vertical-align: middle;
  }

  /* ========== Ticket Policy Banner ========== */
  .policy-banner {
    margin: 8px 16px;
    padding: 10px 14px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }

  .policy-banner.early-bird {
    background: linear-gradient(135deg, rgba(255, 107, 74, 0.15), rgba(255, 138, 110, 0.1));
    border: 1px solid rgba(255, 107, 74, 0.25);
    color: var(--coral-orange);
  }

  .policy-banner.priority {
    background: linear-gradient(135deg, rgba(212, 168, 83, 0.15), rgba(212, 168, 83, 0.1));
    border: 1px solid rgba(212, 168, 83, 0.25);
    color: var(--gold);
  }

  .policy-banner .policy-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .policy-banner.early-bird .policy-icon {
    background: rgba(255, 107, 74, 0.2);
  }

  .policy-banner.priority .policy-icon {
    background: rgba(212, 168, 83, 0.2);
  }

  .policy-banner .policy-content {
    flex: 1;
  }

  .policy-banner .policy-title {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 2px;
  }

  .policy-banner .policy-desc {
    opacity: 0.85;
    font-size: 11px;
  }

  .policy-banner .policy-badge {
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
  }

  .policy-banner.early-bird .policy-badge {
    background: var(--coral-orange);
    color: #fff;
  }

  .policy-banner.priority .policy-badge {
    background: var(--gold);
    color: #1a1a2e;
  }

  /* ========== Divider ========== */
  .section-divider {
    height: 1px;
    margin: 10px 16px;
    background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
  }

  /* ========== Selected Info Panel (Glassmorphism) ========== */
  .info-panel {
    margin: 4px 12px 12px;
    padding: 14px 16px;
    border-radius: 16px;
    background: var(--glass-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .panel-count {
    font-size: 11px;
    color: var(--coral-orange);
    font-weight: 500;
  }

  .selected-seats-display {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
    min-height: 28px;
  }

  .seat-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 4px 10px;
    border-radius: 12px;
    background: rgba(255, 107, 74, 0.12);
    border: 1px solid rgba(255, 107, 74, 0.2);
    font-size: 11px;
    color: var(--coral-orange);
    font-weight: 500;
    animation: chip-in 0.25s ease;
  }

  @keyframes chip-in {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .seat-chip .chip-remove {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
    color: rgba(255, 107, 74, 0.6);
    transition: all 0.2s;
    line-height: 1;
  }

  .seat-chip .chip-remove:hover {
    color: #fff;
    background: rgba(255, 107, 74, 0.3);
  }

  .no-seat-hint {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    padding: 4px 0;
  }

  /* Price breakdown */
  .price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
  }

  .price-label {
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .price-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    font-family: 'Noto Sans SC', sans-serif;
  }

  .price-value.discount {
    color: var(--emerald);
  }

  /* Coupon / Points entries */
  .entry-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    border-top: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .entry-row:active {
    opacity: 0.7;
  }

  .entry-left {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .entry-icon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }

  .entry-icon.coupon {
    background: rgba(255, 107, 74, 0.15);
    color: var(--coral-orange);
  }

  .entry-icon.package {
    background: rgba(212, 168, 83, 0.18);
    color: var(--gold);
  }

  .entry-icon.points {
    background: rgba(212, 168, 83, 0.15);
    color: var(--gold);
  }

  .entry-text {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .entry-arrow {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ========== Bottom Action Bar ========== */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    padding-bottom: env(safe-area-inset-bottom, 0);
    background: linear-gradient(180deg, rgba(10, 22, 40, 0) 0%, rgba(10, 22, 40, 0.95) 20%, var(--bg-dark) 100%);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 20;
  }

  .bottom-bar::before {
    content: '';
    position: absolute;
    top: 0;
    left: 16px;

  // ========== Show Data ==========

  // 当前演出ID，用于匹配套票
  const CURRENT_SHOW_ID = 'show_001';

  // ========== Package (套票) Data ==========

  const PACKAGES = [

      ]
    },
    {

      expire: '2026-08-31',
      vouchers: [
        { id: 'v005', showId: 'show_001', tier: 'b', tierName: 'B区', seatLabel: 'B区座位×1', amount: 380, used: false },
        { id: 'v006', showId: 'show_001', tier: 'a', tierName: 'A区', seatLabel: 'A区座位×1', amount: 580, used: false },
        { id: 'v007', showId: 'show_004', tier: 'a', tierName: 'A区', seatLabel: 'A区座位×1', amount: 580, used: false }

    },

      expire: '2026-10-01',
      vouchers: [
        { id: 'v008', showId: 'show_002', tier: 'vip', tierName: 'VIP区', seatLabel: 'VIP区座位×1', amount: 880, used: false },
        { id: 'v009', showId: 'show_003', tier: 'vip', tierName: 'VIP区', seatLabel: 'VIP区座位×1', amount: 880, used: false }
      ]
    },
    {
      id: 'pkg004',
      name: '周年庆特惠套票',
      desc: '含2张观演券，限本场演出',
      expire: '2026-07-31',
      vouchers: [
        { id: 'v010', showId: 'show_001', tier: 'a', tierName: 'A区', seatLabel: 'A区座位×1', amount: 580, used: false },
        { id: 'v011', showId: 'show_001', tier: 'b', tierName: 'B区', seatLabel: 'B区座位×1', amount: 380, used: false }
      ]
    }
  ];

  // 已选中的观演券列表（支持多张）
  let selectedVouchers = [];
  // 每个观演券对应的减免座位索引 { voucherId: seatIndex }
  let voucherSeatMap = {};

  // ========== Early Bird & Priority Purchase ==========
  // 模拟从后台获取的早鸟票和优先购配置
  const TICKET_POLICY = {
    earlyBird: {
      enabled: true,
      advanceDays: 7,
      discountPercent: 85, // 85折
      limitPerUser: 4,
      endDate: '2026-07-31' // 早鸟票结束日期
    },
    memberPriority: {
      enabled: true,
      memberLevels: ['gold', 'platinum', 'diamond'],
      advanceDays: 3,
      limitPerMember: 6
    }
  };

  // 当前用户会员等级 (null-非会员, gold-黄金, platinum-铂金, diamond-钻石)
  const CURRENT_MEMBER_LEVEL = 'gold'; // 模拟当前用户为黄金会员

  // 计算是否处于早鸟票期间
  function isEarlyBirdPeriod() {
    if (!TICKET_POLICY.earlyBird.enabled) return false;
    const today = new Date();
    const endDate = new Date(TICKET_POLICY.earlyBird.endDate);
    return today <= endDate;
  }

  // 计算是否处于优先购期间
  function isPriorityPeriod() {
    if (!TICKET_POLICY.memberPriority.enabled) return false;
    // 检查当前用户会员等级是否有优先购资格
    return TICKET_POLICY.memberPriority.memberLevels.includes(CURRENT_MEMBER_LEVEL);
  }

  // 获取当前生效的折扣比例 (100 = 无折扣)
  function getCurrentDiscount() {
    if (isEarlyBirdPeriod()) {
      return TICKET_POLICY.earlyBird.discountPercent;
    }
    return 100;
  }

  // 获取当前限购数量
  function getPurchaseLimit() {
    if (isEarlyBirdPeriod()) {
      return TICKET_POLICY.earlyBird.limitPerUser;
    }
    if (isPriorityPeriod()) {
      return TICKET_POLICY.memberPriority.limitPerMember;
    }
    return 6; // 默认限购6张
  }

  // 计算折扣后价格
  function getDiscountedPrice(originalPrice, tier) {
    if (tier === 'vip') return originalPrice; // VIP区不参与折扣
    const discount = getCurrentDiscount();
    return Math.round(originalPrice * discount / 100);
  }

  // 渲染政策横幅
  function renderTicketPolicyBanner() {
    const banner = document.getElementById('ticketPolicyBanner');
    if (!banner) return;

    // 早鸟票优先显示
    if (isEarlyBirdPeriod()) {
      const discount = TICKET_POLICY.earlyBird.discountPercent;
      const limit = TICKET_POLICY.earlyBird.limitPerUser;
      const endDate = new Date(TICKET_POLICY.earlyBird.endDate);
      const daysLeft = Math.ceil((endDate - new Date()) / (1000 * 60 * 60 * 24));

      banner.innerHTML = `
        <div class="policy-banner early-bird">
          <div class="policy-icon">🐦</div>
          <div class="policy-content">
            <div class="policy-title">早鸟特惠 ${discount}折</div>
            <div class="policy-desc">剩余${daysLeft}天 · 每人限购${limit}张</div>
          </div>
          <div class="policy-badge">-${100 - discount}%</div>
        </div>
      `;
      banner.style.display = 'block';
      return;
    }

    // 优先购显示
    if (isPriorityPeriod()) {
      const limit = TICKET_POLICY.memberPriority.limitPerMember;
      const memberLevelName = {
        'gold': '黄金会员',
        'platinum': '铂金会员',
        'diamond': '钻石会员'
      }[CURRENT_MEMBER_LEVEL] || '会员';

      banner.innerHTML = `
        <div class="policy-banner priority">
          <div class="policy-icon">👑</div>
          <div class="policy-content">
            <div class="policy-title">${memberLevelName}优先购</div>
            <div class="policy-desc">提前${TICKET_POLICY.memberPriority.advanceDays}天 · 限购${limit}张</div>
          </div>
          <div class="policy-badge">专享</div>
        </div>
      `;
      banner.style.display = 'block';
      return;
    }

    // 无特殊政策
    banner.style.display = 'none';
  }

  // 更新票档价格显示（折扣后）
  function updateTierPrices() {
    const discount = getCurrentDiscount();
    const priceElements = document.querySelectorAll('.tier-price');

    priceElements.forEach(el => {
      const originalPrice = parseInt(el.getAttribute('data-original'));
      const seatTier = el.getAttribute('data-tier');
      if (originalPrice && discount < 100 && seatTier !== 'vip') {
        const discountedPrice = getDiscountedPrice(originalPrice, seatTier);
        el.innerHTML = `¥${discountedPrice}<span class="original-price">¥${originalPrice}</span>`;
      }
    });
  }

  // 更新限购提示
  function updatePurchaseLimit() {
    const limit = getPurchaseLimit();
    const panelCount = document.getElementById('panelCount');
    if (panelCount) {
      panelCount.textContent = `最多可选${limit}张`;
    }
  }

  // ========== Generate Seat Map ==========
  function generateSeats() {
    const map = document.getElementById('seatMap');
    map.innerHTML = '';

    for (let r = 0; r < ROWS; r++) {
      const rowLabel = ROW_LABELS[r];
      const tier = ROW_TIERS[rowLabel];
      const isVip = tier === 'vip';
      const row = document.createElement('div');
      row.className = 'seat-row';
      row.setAttribute('data-row', r);

      // Left label
      const leftLabel = document.createElement('div');
      leftLabel.className = 'row-label';
      leftLabel.textContent = rowLabel;
      row.appendChild(leftLabel);

      // Seats container
      const seatsInRow = document.createElement('div');
      seatsInRow.className = 'seats-in-row';

      // Vary seat count per row for realistic curve
      const seatCount = r < 2 ? 13 : (r < 5 ? 15 : (r < 7 ? 15 : 17));
      const offset = Math.floor((17 - seatCount) / 2);

      for (let c = 0; c < seatCount; c++) {
        const actualCol = c + offset + 1;
        const seatId = `${rowLabel}-${actualCol}`;

        // Add aisle gap
        if (c === Math.floor(seatCount / 2)) {
          const gap = document.createElement('div');
          gap.className = 'seat-gap';
          seatsInRow.appendChild(gap);
        }

        const seat = document.createElement('div');
        seat.className = 'seat';
        seat.setAttribute('data-id', seatId);
        seat.setAttribute('data-row', rowLabel);
        seat.setAttribute('data-col', actualCol);
        seat.setAttribute('data-tier', tier);

        // 根据票档设置边框颜色
        const tierBorderColors = {
          vip: '#D4A853',
          a: '#FF6B4A',
          b: '#3B82F6',
          c: '#10B981'
        };
        seat.style.borderColor = tierBorderColors[tier] || 'rgba(255,255,255,0.2)';

        if (SOLD_SEATS.has(seatId)) {
          seat.classList.add('sold');
        } else {
          seat.classList.add('available');
          if (isVip) seat.classList.add('vip');
          seat.addEventListener('click', () => toggleSeat(seat));
        }

        seatsInRow.appendChild(seat);
      }

      row.appendChild(seatsInRow);

      // Right label
      const rightLabel = document.createElement('div');
      rightLabel.className = 'row-label-right';
      rightLabel.textContent = rowLabel;
      row.appendChild(rightLabel);

      map.appendChild(row);
    }
  }

  // ========== Toggle Seat Selection ==========
  function toggleSeat(seatEl) {
    const seatId = seatEl.getAttribute('data-id');

    if (seatEl.classList.contains('selected')) {
      // Deselect
      seatEl.classList.remove('selected');
      selectedSeats = selectedSeats.filter(s => s.id !== seatId);
      // Re-trigger bounce animation
      void seatEl.offsetWidth;
    } else {
      // Check max (使用动态限购数量)
      const maxSelect = getPurchaseLimit();
      if (selectedSeats.length >= maxSelect) {
        showToast(`最多可选择${maxSelect}个座位`);
        // Shake animation
        seatEl.style.animation = 'none';
        void seatEl.offsetWidth;
        seatEl.style.animation = 'shake 0.4s ease';
        setTimeout(() => { seatEl.style.animation = ''; }, 400);
        return;
      }

      // Check tier filter
      const tier = seatEl.getAttribute('data-tier');
      if (currentTier !== 'all' && tier !== currentTier) {
        showToast('当前筛选模式下不可选此区域座位');
        return;
      }

      seatEl.classList.add('selected');
      const originalPrice = PRICES[tier];
      const discountedPrice = getDiscountedPrice(originalPrice, tier);
      const tierNameMap = { vip: 'VIP区', a: 'A区', b: 'B区', c: 'C区' };
      selectedSeats.push({
        id: seatId,
        row: seatEl.getAttribute('data-row'),
        col: seatEl.getAttribute('data-col'),
        tier: tier,
        tierName: tierNameMap[tier] || tier,
        price: discountedPrice,
        originalPrice: originalPrice
      });

      // 自动匹配观演券
      autoMatchVouchers();
    }

    updatePanel();
    recalcPrice();
  }

  // ========== Update Info Panel ==========
  function updatePanel() {
    const display = document.getElementById('selectedDisplay');
    const hint = document.getElementById('noSeatHint');
    const countEl = document.getElementById('panelCount');
    const breakdown = document.getElementById('priceBreakdown');
    const subtotalEl = document.getElementById('priceSubtotal');
    const unitLabel = document.getElementById('priceUnitLabel');
    const totalEl = document.getElementById('bottomTotalAmount');
    const confirmBtn = document.getElementById('confirmBtn');

    const maxSelect = getPurchaseLimit();

    if (selectedSeats.length === 0) {
      display.innerHTML = '<div class="no-seat-hint" id="noSeatHint">点击座位进行选择</div>';
      countEl.textContent = `最多可选${maxSelect}张`;
      breakdown.style.display = 'none';
      totalEl.textContent = '0';
      confirmBtn.disabled = true;
      return;
    }

    confirmBtn.disabled = false;
    countEl.textContent = `已选 ${selectedSeats.length}/${maxSelect} 张`;
    breakdown.style.display = 'block';

    // Build chips
    display.innerHTML = '';
    selectedSeats.forEach((s, i) => {
      const chip = document.createElement('div');
      chip.className = 'seat-chip';
      chip.innerHTML = `
        <span>${s.row}排${s.col}座</span>
        <span class="chip-remove" onclick="removeSeat(${i})">×</span>
      `;
      display.appendChild(chip);
    });

    // Calculate prices
    const total = selectedSeats.reduce((sum, s) => sum + s.price, 0);

    // Group by tier for display
    const tierGroups = {};
    selectedSeats.forEach(s => {
      if (!tierGroups[s.tier]) tierGroups[s.tier] = { count: 0, price: s.price };
      tierGroups[s.tier].count++;
    });

    const parts = Object.entries(tierGroups).map(([tier, info]) => {
      const tierName = { vip: 'VIP', a: 'A区', b: 'B区', c: 'C区' }[tier];
      return `${tierName} ¥${info.price}×${info.count}`;
    });
    unitLabel.textContent = parts.join(' + ');

    subtotalEl.textContent = `¥${total}`;
  }

  // ========== Remove Seat ==========
  function removeSeat(index) {
    // 先移除关联的观演券
    unmatchVoucherForSeat(index);

    const seat = selectedSeats[index];
    const seatEl = document.querySelector(`.seat[data-id="${seat.id}"]`);
    if (seatEl) {
      seatEl.classList.remove('selected');
    }
    selectedSeats.splice(index, 1);
    updatePanel();
    recalcPrice();
  }

  // ========== Tier Filter ==========
  function selectTier(el) {
    document.querySelectorAll('.tier-tag').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentTier = el.getAttribute('data-tier');

    // Highlight matching seats, dim others
    document.querySelectorAll('.seat.available, .seat.selected').forEach(seat => {
      const tier = seat.getAttribute('data-tier');
      if (currentTier === 'all' || tier === currentTier) {
        seat.style.opacity = '1';
      } else {
        seat.style.opacity = '0.2';
      }
    });
  }

  // ========== Zoom ==========
  function zoomIn() {
    if (currentZoom >= 1.5) return;
    currentZoom = Math.min(1.5, currentZoom + 0.1);
    applyZoom();
  }

  function zoomOut() {
    if (currentZoom <= 0.6) return;
    currentZoom = Math.max(0.6, currentZoom - 0.1);
    applyZoom();
  }

  function applyZoom() {
    const map = document.getElementById('seatMap');
    map.style.transform = `scale(${currentZoom})`;
    document.getElementById('zoomLevel').textContent = Math.round(currentZoom * 100) + '%';
  }

  // ========== Touch pinch zoom ==========
  let initialPinchDistance = 0;
  let initialZoom = 1;

  document.getElementById('seatMapScroll').addEventListener('touchstart', function(e) {
    if (e.touches.length === 2) {
      initialPinchDistance = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      initialZoom = currentZoom;
    }
  }, { passive: true });

  document.getElementById('seatMapScroll').addEventListener('touchmove', function(e) {
    if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const scale = dist / initialPinchDistance;
      currentZoom = Math.min(1.5, Math.max(0.6, initialZoom * scale));
      applyZoom();
    }
  }, { passive: true });

  // ========== Toast ==========
  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      toast.classList.remove('show');
    }, 1800);
  }

  // ========== Confirm ==========
  function confirmSeats() {
    if (selectedSeats.length === 0) return;
    const showName = document.querySelector('.show-title')?.textContent || '';
    const showDate = document.querySelector('.show-date')?.textContent || '';
    const showVenue = document.querySelector('.show-venue')?.textContent || '';
    const seatsData = selectedSeats.map(function(s) {
      return { tier: s.tier, tierName: s.tierName, row: s.row, col: s.col, price: s.price, originalPrice: s.originalPrice };
    });
    const params = new URLSearchParams();
    params.set('show', showName);
    params.set('date', showDate);
    params.set('venue', showVenue);
    params.set('seats', encodeURIComponent(JSON.stringify(seatsData)));
    // 传递观演券信息
    if (selectedVouchers.length > 0) {
      const voucherData = selectedVouchers.map(v => ({
        id: v.id,
        name: v.packageName + ' - ' + v.tierName + '观演券',
        amount: v.amount,
        seatIndex: voucherSeatMap[v.id]
      }));
      params.set('vouchers', encodeURIComponent(JSON.stringify(voucherData)));
    }
    window.location.href = 'order-confirm.html?' + params.toString();
  }

  // ========== Coupon Logic ==========
  function getOriginalTotal() {
    // 返回折扣后的总价（实际应付）
    return selectedSeats.reduce((sum, s) => sum + s.price, 0);
  }

  function getOriginalPriceTotal() {
    // 返回原始总价（折扣前）
    return selectedSeats.reduce((sum, s) => sum + (s.originalPrice || s.price), 0);
  }

  // ========== Package (套票) Logic ==========
  // 获取匹配当前演出的可用观演券
  function getCurrentShowVouchers() {
    const vouchers = [];
    PACKAGES.forEach(pkg => {
      pkg.vouchers.forEach(v => {
        if (v.showId === CURRENT_SHOW_ID && !v.used && !selectedVouchers.some(sv => sv.id === v.id)) {
          vouchers.push({
            ...v,
            packageId: pkg.id,
            packageName: pkg.name,
            packageExpire: pkg.expire
          });
        }
      });
    });
    return vouchers;
  }

  // 获取有匹配观演券的票档集合（用于显示套票标签）
  function getPackageTiers() {
    const tiers = new Set();
    PACKAGES.forEach(pkg => {
      pkg.vouchers.forEach(v => {
        if (v.showId === CURRENT_SHOW_ID && !v.used) {
          tiers.add(v.tier);
        }
      });
    });
    return tiers;
  }

  // 更新票档标签上的套票徽章
  function updateTierBadges() {
    const packageTiers = getPackageTiers();
    document.getElementById('badgeA').style.display = packageTiers.has('a') ? 'inline-block' : 'none';
    document.getElementById('badgeB').style.display = packageTiers.has('b') ? 'inline-block' : 'none';
    document.getElementById('badgeC').style.display = packageTiers.has('c') ? 'inline-block' : 'none';
  }

  // 自动匹配观演券到已选座位（选择座位时调用）
  function autoMatchVouchers() {
    const availableVouchers = getCurrentShowVouchers();
    const newlyMatched = [];

    // 遍历每个已选座位，尝试匹配观演券
    selectedSeats.forEach((seat, seatIndex) => {
      // 检查该座位是否已被某个观演券减免
      const alreadyCovered = Object.values(voucherSeatMap).includes(seatIndex);
      if (alreadyCovered) return;

      // 查找匹配该座位票档的可用观演券
      const matchIndex = availableVouchers.findIndex(v => v.tier === seat.tier);
      if (matchIndex >= 0) {
        const voucher = availableVouchers.splice(matchIndex, 1)[0];
        selectedVouchers.push(voucher);
        voucherSeatMap[voucher.id] = seatIndex;
        newlyMatched.push(voucher);
      }
    });

    if (newlyMatched.length > 0) {
      updatePackageEntry();
    }
  }

  // 取消座位时，同步移除关联的观演券
  function unmatchVoucherForSeat(seatIndex) {
    const voucherId = Object.keys(voucherSeatMap).find(id => voucherSeatMap[id] === seatIndex);
    if (voucherId) {
      selectedVouchers = selectedVouchers.filter(v => v.id !== voucherId);
      delete voucherSeatMap[voucherId];
    }
    // 重新调整 seatIndex（因为座位列表变了）
    const newMap = {};
    selectedVouchers.forEach(v => {
      const oldSeatIndex = voucherSeatMap[v.id];
      if (oldSeatIndex !== undefined && oldSeatIndex < seatIndex) {
        newMap[v.id] = oldSeatIndex;
      } else if (oldSeatIndex !== undefined && oldSeatIndex > seatIndex) {
        newMap[v.id] = oldSeatIndex - 1;
      }
    });
    Object.assign(voucherSeatMap, newMap);
  }

  function openPackageSheet() {
    const overlay = document.getElementById('couponOverlay');
    const sheet = document.getElementById('couponSheet');
    const list = document.getElementById('couponList');

    if (selectedSeats.length === 0) {
      showToast('请先选择座位');
      return;
    }

    // 更新sheet标题
    document.querySelector('.coupon-sheet-title').textContent = '选择套票观演券';

    list.innerHTML = '';

    // 获取所有观演券（过滤掉VIP区，VIP区没有套票）
    const allVouchers = [];
    PACKAGES.forEach(pkg => {
      pkg.vouchers.forEach(v => {
        if (!v.used && v.tier !== 'vip') {
          allVouchers.push({
            ...v,
            packageId: pkg.id,
            packageName: pkg.name,
            packageExpire: pkg.expire,
            isCurrentShow: v.showId === CURRENT_SHOW_ID,
            showName: SHOWS[v.showId] ? SHOWS[v.showId].name : '未知演出'
          });
        }
      });
    });

    if (allVouchers.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:32px 16px;font-size:13px;">暂无可用的套票观演券</div>';
    } else {
      allVouchers.forEach(v => {
        let isDisabled = false;
        let reason = '';
        const isSelected = selectedVouchers.some(sv => sv.id === v.id);

        // 非本场演出的观演券不可选
        if (!v.isCurrentShow) {
          isDisabled = true;
          reason = `限「${v.showName}」使用`;
        } else {
          // 本场演出：检查是否选了对应票档的座位
          const hasMatchingSeat = selectedSeats.some(s => s.tier === v.tier);
          if (!hasMatchingSeat) {
            isDisabled = true;
            reason = `需选择${v.tierName}座位才可使用`;
          }
          // 检查是否已被选中
          if (isSelected) {
            isDisabled = true;
            reason = '已使用';
          }
        }

        const card = document.createElement('div');
        card.className = 'coupon-card';
        if (isDisabled) card.classList.add('disabled');
        if (isSelected) card.classList.add('selected');

        card.innerHTML = `
          <div class="coupon-amount">
            <span class="amount-value">${v.tierName}观演券</span>
            <span class="amount-unit">${v.seatLabel}</span>
          </div>
          <div class="coupon-info">
            <div class="coupon-name">${v.packageName}</div>
            <div class="coupon-condition">${v.isCurrentShow ? '价值¥' + v.amount + ' · 有效期至' + v.packageExpire : '限「' + v.showName + '」使用'}</div>
            ${isDisabled && reason ? `<div class="coupon-disabled-reason">${reason}</div>` : ''}
          </div>
        `;

        if (!isDisabled) {
          card.addEventListener('click', () => selectVoucher(v));
        }

        list.appendChild(card);
      });
    }

    const noneBtn = document.createElement('div');
    noneBtn.className = 'coupon-none-btn';
    noneBtn.textContent = '不使用套票';
    noneBtn.addEventListener('click', () => {
      selectedVouchers = [];
      voucherSeatMap = {};
      closeCouponSheet();
      updatePackageEntry();
      recalcPrice();
    });
    list.appendChild(noneBtn);

    overlay.classList.add('show');
    sheet.classList.add('show');
  }

  function selectVoucher(voucher) {
    // 找到对应票档的第一个未被减免的座位索引
    const seatIndex = selectedSeats.findIndex((s, idx) => {
      return s.tier === voucher.tier && !Object.values(voucherSeatMap).includes(idx);
    });

    if (seatIndex >= 0) {
      selectedVouchers.push(voucher);
      voucherSeatMap[voucher.id] = seatIndex;
    }

    closeCouponSheet();
    updatePackageEntry();
    recalcPrice();
  }

  function closeCouponSheet() {
    document.getElementById('couponOverlay').classList.remove('show');
    document.getElementById('couponSheet').classList.remove('show');
  }

  function updatePackageEntry() {
    const text = document.getElementById('packageEntryText');
    const arrow = document.getElementById('packageEntryArrow');
    if (selectedVouchers.length > 0) {
      const totalDeduct = selectedVouchers.reduce((sum, v) => sum + v.amount, 0);
      text.textContent = `已选${selectedVouchers.length}张观演券 -¥${totalDeduct}`;
      text.style.color = 'var(--coral-orange)';
      arrow.textContent = '›';
    } else {
      text.textContent = '使用套票';
      text.style.color = '';
      arrow.textContent = '›';
    }
  }

  // ========== Price Calculation ==========
  function recalcPrice() {
    // 无座位时重置所有价格行并返回
    if (selectedSeats.length === 0) {
      const earlyBirdRow = document.getElementById('earlyBirdDiscountRow');
      const packageRow = document.getElementById('packageDiscountRow');
      const couponHintRow = document.getElementById('couponHintRow');
      const memberDiscountRow = document.getElementById('memberDiscountRow');
      if (earlyBirdRow) earlyBirdRow.style.display = 'none';
      if (packageRow) packageRow.style.display = 'none';
      if (couponHintRow) couponHintRow.style.display = 'none';
      if (memberDiscountRow) memberDiscountRow.style.display = 'none';

      const totalEl = document.getElementById('bottomTotalAmount');
      totalEl.textContent = '0';

      const bottomOriginalEl = document.getElementById('bottomOriginalPrice');
      if (bottomOriginalEl) {
        bottomOriginalEl.textContent = '';
        bottomOriginalEl.style.display = 'none';
      }

      const bottomDeductEl = document.getElementById('bottomDeductAmount');
      if (bottomDeductEl) {
        bottomDeductEl.style.display = 'none';
        bottomDeductEl.textContent = '';
      }

      return;
    }

    // 先自动匹配观演券（确保新选座位被匹配）
    autoMatchVouchers();

    const originalTotal = getOriginalTotal();
    // 套票观演券减免：多张观演券分别减免对应座位
    let packageDeduct = 0;
    selectedVouchers.forEach(v => {
      const seatIndex = voucherSeatMap[v.id];
      if (seatIndex !== undefined && seatIndex >= 0 && seatIndex < selectedSeats.length) {
        packageDeduct += selectedSeats[seatIndex].price;
      }
    });
    const finalTotal = Math.max(0, originalTotal - packageDeduct);

    // Update discount rows visibility
    const earlyBirdRow = document.getElementById('earlyBirdDiscountRow');
    const packageRow = document.getElementById('packageDiscountRow');
    const couponHintRow = document.getElementById('couponHintRow');
    const memberDiscountRow = document.getElementById('memberDiscountRow');

    // 计算早鸟票折扣金额
    let earlyBirdDeduct = 0;
    if (isEarlyBirdPeriod()) {
      const origSum = selectedSeats.reduce((sum, s) => sum + (s.originalPrice || s.price), 0);
      const discSum = selectedSeats.reduce((sum, s) => sum + s.price, 0);
      earlyBirdDeduct = origSum - discSum;
    }

    // 计算会员折扣（白金会员9折，减免10%）
    const discSumForMember = selectedSeats.reduce((sum, s) => sum + s.price, 0);
    let memberDiscount = Math.floor(discSumForMember * 0.1);

    // 票品折扣行：只在无套票时显示
    if (selectedVouchers.length === 0 && earlyBirdDeduct > 0) {
      earlyBirdRow.style.display = 'flex';
      document.getElementById('priceEarlyBirdDiscount').textContent = `-¥${earlyBirdDeduct}`;
    } else {
      earlyBirdRow.style.display = 'none';
    }

    // 会员折扣行：只在无套票时显示
    if (selectedVouchers.length === 0 && memberDiscount > 0) {
      memberDiscountRow.style.display = 'flex';
      document.getElementById('priceMemberDiscount').textContent = `-¥${memberDiscount}`;
    } else {
      memberDiscountRow.style.display = 'none';
    }

    // 套票抵扣
    if (selectedVouchers.length > 0 && packageDeduct > 0) {
      packageRow.style.display = 'flex';
      const seatLabels = selectedVouchers.map(v => {
        const idx = voucherSeatMap[v.id];
        if (idx !== undefined && idx >= 0 && idx < selectedSeats.length) {
          const s = selectedSeats[idx];
          return `${s.tierName || s.zone} ${s.row}排${s.col}座`;
        }
        return '';
      }).filter(Boolean);
      document.getElementById('pricePackageDiscount').textContent = `-¥${packageDeduct}（${seatLabels.join('、')}）`;
    } else {
      packageRow.style.display = 'none';
    }

    // 优惠券提示：计算当前可用优惠券的最大减免金额
    const maxCouponDiscount = getMaxAvailableCouponDiscount(originalTotal);
    if (maxCouponDiscount > 0) {
      couponHintRow.style.display = 'flex';
      document.getElementById('couponHintText').textContent = `最高可减¥${maxCouponDiscount}`;
    } else {
      couponHintRow.style.display = 'none';
    }

    // Update total (底栏实付金额)
    const bottomTotalEl = document.getElementById('bottomTotalAmount');
    bottomTotalEl.textContent = finalTotal.toFixed(2);

    // Update total discount display (价格明细面板)
    const totalDeduct = earlyBirdDeduct + packageDeduct + (selectedVouchers.length === 0 ? memberDiscount : 0);

    // ========== 更新底栏三行信息 ==========
    const bottomOriginalEl = document.getElementById('bottomOriginalPrice');
    const bottomDeductEl = document.getElementById('bottomDeductAmount');

    // 优惠前原价（原价之和）
    const origPriceSum = selectedSeats.reduce((sum, s) => sum + (s.originalPrice || s.price), 0);
    if (origPriceSum > finalTotal) {
      bottomOriginalEl.textContent = `¥${origPriceSum}`;
      bottomOriginalEl.style.display = 'inline';
    } else {
      bottomOriginalEl.style.display = 'none';
    }

    // 已减免金额
    if (totalDeduct > 0) {
      bottomDeductEl.textContent = `已减免¥${totalDeduct}`;
      bottomDeductEl.style.display = 'block';
    } else {
      bottomDeductEl.style.display = 'none';
    }
  }

  // 计算当前可用优惠券的最大减免金额
  function getMaxAvailableCouponDiscount(total) {
    let max = 0;
    COUPONS.forEach(c => {
      if (!c.disabled && total >= c.minAmount && c.amount > max) {
        max = c.amount;
      }
    });
    return max;
  }

  function getFinalTotal() {
    const originalTotal = getOriginalTotal();
    let packageDeduct = 0;
    selectedVouchers.forEach(v => {
      const seatIndex = voucherSeatMap[v.id];
      if (seatIndex !== undefined && seatIndex >= 0 && seatIndex < selectedSeats.length) {
        packageDeduct += selectedSeats[seatIndex].price;
      }
    });
    return Math.max(0, originalTotal - packageDeduct);
  }

  // ========== Shake Animation (injected) ==========
  const shakeStyle = document.createElement('style');
  shakeStyle.textContent = `
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-3px); }
      40% { transform: translateX(3px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }
  `;
  document.head.appendChild(shakeStyle);

  // ========== Init ==========
  renderTicketPolicyBanner();
  updateTierPrices();
  updatePurchaseLimit();
  updateTierBadges();
  generateSeats();
</script>
