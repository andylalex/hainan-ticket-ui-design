<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>海南演艺票务系统 - 个人中心</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ========== Reset & Base ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #F5F6FA;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* ========== Phone Frame ========== */
    .phone-frame {
      width: 100%;
      max-width: 375px;
      min-height: 100vh;
      min-height: 100dvh;
      background: #F5F6FA;
      position: relative;
      overflow-x: hidden;
      padding-bottom: 80px;
    }

    /* ========== Status Bar ========== */
    .status-bar {
      height: 44px;
      background: linear-gradient(135deg, #0A1628 0%, #132240 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
    }

    .status-bar .time { font-weight: 600; font-size: 14px; }

    .status-bar .icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-bar .icons svg { width: 16px; height: 16px; fill: #fff; }

    /* ========== Message Entry Bar ========== */
    .message-entry-bar {
      background: linear-gradient(135deg, #0A1628 0%, #132240 100%);
      padding: 0 16px 12px;
    }

    .message-entry {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 14px;
      text-decoration: none;
      transition: all 0.2s;
    }

    .message-entry:active {
      background: rgba(255, 255, 255, 0.12);
    }

    .message-entry-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #FF6B4A, #FF8A70);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }

    .message-entry-icon svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .message-red-dot {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 10px;
      height: 10px;
      background: #FF3B30;
      border-radius: 50%;
      border: 2px solid #0A1628;
      animation: pulse-red 2s infinite;
    }

    @keyframes pulse-red {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    .message-entry-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .message-entry-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .message-entry-text {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    .message-entry-arrow {
      font-size: 20px;
      color: rgba(255, 255, 255, 0.4);
    }

    /* ========== User Info Card ========== */
    .user-card {
      background: linear-gradient(135deg, #0A1628 0%, #132240 50%, #1a2d50 100%);
      padding: 0 20px 28px;
      position: relative;
      overflow: hidden;
    }

    .user-card::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -40px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255, 107, 74, 0.15) 0%, transparent 70%);
      border-radius: 50%;
    }

    .user-card::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: -20px;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(212, 168, 83, 0.1) 0%, transparent 70%);
      border-radius: 50%;
    }

    .user-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 8px;
      margin-bottom: 20px;
    }

    .user-card-top .page-title {
      color: rgba(255, 255, 255, 0.9);
      font-size: 17px;
      font-weight: 500;
    }

    .user-card-top .settings-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.2s;
      position: relative;
    }

    .notification-dot {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 8px;
      height: 8px;
      background: #FF6B4A;
      border-radius: 50%;
      border: 2px solid #0A1628;
    }

    .user-card-top .settings-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .user-card-top .settings-btn svg {
      width: 22px;
      height: 22px;
      fill: rgba(255, 255, 255, 0.85);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .avatar-wrapper {
      position: relative;
      flex-shrink: 0;
    }

    .avatar-ring {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #D4A853, #FF6B4A, #D4A853);
      box-shadow: 0 0 20px rgba(212, 168, 83, 0.3);
    }

    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #0A1628;
    }

    .vip-badge {
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #D4A853, #F0C75E);
      color: #0A1628;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 8px;
      border-radius: 10px;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(212, 168, 83, 0.4);
    }

    .user-detail {
      flex: 1;
    }

    .user-name {
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .member-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: linear-gradient(135deg, #D4A853, #F0C75E);
      color: #0A1628;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .member-tag svg { width: 10px; height: 10px; fill: #0A1628; }

    .user-id {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      margin-bottom: 10px;
    }

    .edit-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.85);
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .edit-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .edit-btn svg { width: 14px; height: 14px; fill: rgba(255, 255, 255, 0.85); }

    /* Real-name auth tip */
    .auth-tip {
      margin-top: 16px;
      background: rgba(255, 107, 74, 0.12);
      border: 1px solid rgba(255, 107, 74, 0.25);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
      cursor: pointer;
      transition: background 0.2s;
    }

    .auth-tip:hover {
      background: rgba(255, 107, 74, 0.18);
    }

    .auth-tip svg { width: 18px; height: 18px; fill: #FF6B4A; flex-shrink: 0; }

    .auth-tip .auth-text {
      flex: 1;
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
    }

    .auth-tip .auth-text span {
      color: #FF6B4A;
      font-weight: 500;
    }

    .auth-tip .auth-arrow {
      color: rgba(255, 255, 255, 0.4);
      font-size: 16px;
    }

    /* ========== Asset Overview ========== */
    .asset-section {
      padding: 16px 16px 0;
      margin-top: -12px;
      position: relative;
      z-index: 2;
    }

    .asset-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(10, 22, 40, 0.06);
      padding: 18px 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .asset-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 4px 0;
      transition: transform 0.15s;
    }

    .asset-item:active {
      transform: scale(0.96);
    }

    .asset-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .asset-icon svg { width: 22px; height: 22px; }

    .asset-icon.wallet { background: linear-gradient(135deg, #FFF0EB, #FFE0D6); }
    .asset-icon.wallet svg { fill: #FF6B4A; }

    .asset-icon.points { background: linear-gradient(135deg, #E8F9F5, #D0F5EC); }
    .asset-icon.points svg { fill: #00C9A7; }

    .asset-icon.coupon { background: linear-gradient(135deg, #FFF8E7, #FFEDC2); }
    .asset-icon.coupon svg { fill: #D4A853; }

    .asset-icon.ticket { background: linear-gradient(135deg, #EBF0FF, #D6E0FF); }
    .asset-icon.ticket svg { fill: #4A7AFF; }

    .asset-value {
      font-size: 18px;
      font-weight: 700;
      color: #0A1628;
      line-height: 1;
    }

    .asset-value .unit {
      font-size: 12px;
      font-weight: 500;
    }

    .asset-label {
      font-size: 11px;
      color: #8E95A9;
      margin-top: -4px;
    }

    /* ========== Order Entry ========== */
    .order-section {
      padding: 16px 16px 0;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .section-header .title {
      font-size: 16px;
      font-weight: 700;
      color: #0A1628;
    }

    .section-header .more {
      display: flex;
      align-items: center;
      gap: 2px;
      font-size: 13px;
      color: #8E95A9;
      cursor: pointer;
    }

    .section-header .more svg { width: 14px; height: 14px; fill: #8E95A9; }

    .order-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(10, 22, 40, 0.06);
      padding: 20px 8px 16px;
    }

    .order-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
    }

    .order-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      position: relative;
      padding: 4px 0;
      transition: transform 0.15s;
    }

    .order-item:active {
      transform: scale(0.96);
    }

    .order-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F5F6FA;
      position: relative;
    }

    .order-icon svg { width: 22px; height: 22px; fill: #5A6178; }

    .order-icon .badge {
      position: absolute;
      top: -2px;
      right: -4px;
      min-width: 16px;
      height: 16px;
      background: #FF6B4A;
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid #fff;
    }

    .order-label {
      font-size: 12px;
      color: #5A6178;
    }

    /* ========== Tools Section ========== */
    .tools-section {
      padding: 16px 16px 0;
    }

    .tools-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(10, 22, 40, 0.06);
      overflow: hidden;
    }

    .tool-item {
      display: flex;
      align-items: center;
      padding: 15px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #F5F6FA;
    }

    .tool-item:last-child {
      border-bottom: none;
    }

    .tool-item:active {
      background: #FAFBFD;
    }

    .tool-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 14px;
      flex-shrink: 0;
    }

    .tool-icon svg { width: 20px; height: 20px; }

    .tool-icon.orange { background: #FFF0EB; }
    .tool-icon.orange svg { fill: #FF6B4A; }

    .tool-icon.green { background: #E8F9F5; }
    .tool-icon.green svg { fill: #00C9A7; }

    .tool-icon.gold { background: #FFF8E7; }
    .tool-icon.gold svg { fill: #D4A853; }

    .tool-icon.blue { background: #EBF0FF; }
    .tool-icon.blue svg { fill: #4A7AFF; }

    .tool-icon.purple { background: #F3EDFF; }
    .tool-icon.purple svg { fill: #7C5CFC; }

    .tool-icon.pink { background: #FFE8F0; }
    .tool-icon.pink svg { fill: #FF5C8A; }

    .tool-icon.teal { background: #E5F7F5; }
    .tool-icon.teal svg { fill: #2AB5A0; }

    .tool-icon.slate { background: #EEF0F4; }
    .tool-icon.slate svg { fill: #5A6178; }

    .tool-content {
      flex: 1;
    }

    .tool-name {
      font-size: 15px;
      font-weight: 500;
      color: #0A1628;
    }

    .tool-desc {
      font-size: 11px;
      color: #8E95A9;
      margin-top: 2px;
    }

    .tool-arrow {
      color: #C8CCD8;
      font-size: 18px;
      flex-shrink: 0;
    }

    .tool-extra {
      font-size: 12px;
      color: #8E95A9;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .tool-extra.verified {
      color: #00C9A7;
      font-weight: 500;
    }

    .tool-extra.unverified {
      color: #FF6B4A;
      font-weight: 500;
    }

    /* ========== Other Section ========== */
    .other-section {
      padding: 16px 16px 0;
    }

    .other-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(10, 22, 40, 0.06);
      overflow: hidden;
    }

    .other-item {
      display: flex;
      align-items: center;
      padding: 15px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #F5F6FA;
    }

    .other-item:last-child {
      border-bottom: none;
    }

    .other-item:active {
      background: #FAFBFD;
    }

    .other-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 14px;
      flex-shrink: 0;
    }

    .other-icon svg { width: 20px; height: 20px; }

    .other-icon.red { background: #FFF0EB; }
    .other-icon.red svg { fill: #FF6B4A; }

    .other-icon.cyan { background: #E5F7F5; }
    .other-icon.cyan svg { fill: #2AB5A0; }

    .other-icon.indigo { background: #EBF0FF; }
    .other-icon.indigo svg { fill: #4A7AFF; }

    .other-icon.amber { background: #FFF8E7; }
    .other-icon.amber svg { fill: #D4A853; }

    .other-content {
      flex: 1;
    }

    .other-name {
      font-size: 15px;
      font-weight: 500;
      color: #0A1628;
    }

    .other-arrow {
      color: #C8CCD8;
      font-size: 18px;
      flex-shrink: 0;
    }

    .msg-badge {
      min-width: 16px;
      height: 16px;
      background: #FF6B4A;
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      margin-right: 8px;
      flex-shrink: 0;
    }

    /* ========== Bottom TabBar ========== */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 375px;
  height: 64px;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: space-around;
  box-shadow: 0 -1px 20px rgba(10,22,40,0.06);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.tab-bar .tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  text-decoration: none;
  color: #999;
  font-size: 10px;
  font-weight: 500;
  position: relative;
  padding: 6px 0;
  transition: color 0.25s;
  cursor: pointer;
}

.tab-bar .tab-item i {
  font-size: 20px;
  transition: transform 0.25s, color 0.25s;
}

.tab-bar .tab-item.active {
  color: #FF6B4A;
}

.tab-bar .tab-item.active i {
  transform: scale(1.1);
}

.tab-bar .tab-item.active::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 3px;
  background: linear-gradient(90deg, #FF6B4A, #D4A853);
  border-radius: 0 0 3px 3px;
}

.tab-bar .tab-item:hover {
  color: #FF6B4A;
}

    /* ========== Spacing ========== */
    .spacer {
      height: 20px;
    }

    /* ========== Animations ========== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .asset-section { animation: fadeInUp 0.4s ease 0.1s both; }
    .order-section { animation: fadeInUp 0.4s ease 0.2s both; }
    .tools-section { animation: fadeInUp 0.4s ease 0.3s both; }
    .other-section { animation: fadeInUp 0.4s ease 0.4s both; }

    /* ========== Scrollbar ========== */
    .phone-frame::-webkit-scrollbar { width: 0; }
  
    
    
    
    
    
  </style>
</head>
<body>

<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <!-- User Info Card -->
  <div class="user-card">
    <div class="user-card-top">
      <span class="page-title">个人中心</span>
      <div class="settings-btn" style="position:relative;cursor:pointer;" onclick="location.href='message-service.html'">
        <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        <span class="notification-dot"></span>
      </div>
    </div>

    <a href="profile-edit.html" style="text-decoration:none;color:inherit;">
    <div class="user-info">
      <div class="avatar-wrapper">
        <div class="avatar-ring">
          <img src="https://picsum.photos/seed/hainan-avatar/200/200" alt="用户头像">
        </div>
        <div class="vip-badge">VIP 3</div>
      </div>
      <div class="user-detail">
        <div class="user-name">
          海南小椰子
          <span class="member-tag">
            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            金卡会员
          </span>
        </div>
        <div class="user-id">ID: 8886 5200</div>
        <div class="edit-btn">
          <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          编辑资料
