<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>海南演艺票务系统 - 管理员登录</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .phone-frame {
      width: 100%;
      max-width: 375px;
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(180deg, #0A1628 0%, #132744 40%, #1a3a5c 100%);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,0,0,0.4), 0 0 120px rgba(10,22,40,0.3);
      display: flex;
      flex-direction: column;
    }

    /* Status Bar */
    .status-bar {
      height: 44px;
      padding: 10px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      z-index: 10;
      flex-shrink: 0;
    }
    .status-bar .time { font-weight: 600; font-size: 14px; }
    .status-bar .status-icons { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .status-bar .status-icons i { font-size: 13px; }
    .status-bar .battery { width: 22px; height: 10px; border: 1.5px solid #fff; border-radius: 2px; position: relative; display: inline-block; }
    .status-bar .battery::after { content: ''; position: absolute; right: -4px; top: 2px; width: 2px; height: 5px; background: #fff; border-radius: 0 1px 1px 0; }
    .status-bar .battery-fill { width: 75%; height: 100%; background: #00C9A7; border-radius: 1px; }

    /* Particles */
    .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
    .particle { position: absolute; width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.12); animation: particleFloat linear infinite; }
    @keyframes particleFloat {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-20px) translateX(20px); opacity: 0; }
    }

    /* Light Orbs */
    .light-orb { position: absolute; border-radius: 50%; filter: blur(60px); z-index: 0; pointer-events: none; }
    .light-orb-1 { width: 180px; height: 180px; background: rgba(212,168,83,0.1); top: -30px; left: -50px; animation: orbDrift1 9s ease-in-out infinite; }
    .light-orb-2 { width: 140px; height: 140px; background: rgba(0,201,167,0.08); bottom: 100px; right: -40px; animation: orbDrift2 11s ease-in-out infinite; }
    @keyframes orbDrift1 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(20px,25px) scale(1.1); } }
    @keyframes orbDrift2 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-20px,-15px) scale(1.12); } }

    /* Login Content */
    .login-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 32px 40px;
      position: relative;
      z-index: 2;
    }

    /* Brand */
    .login-brand {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeInUp 0.7s ease-out 0.2s both;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .login-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      animation: logoFloat 4s ease-in-out infinite;
    }
    .login-logo img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 6px 20px rgba(212,168,83,0.3)); }
    @keyframes logoFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

    .login-brand h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 2px; margin-bottom: 6px; }
    .login-brand .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: rgba(212,168,83,0.15);
      border: 1px solid rgba(212,168,83,0.25);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: #D4A853;
      letter-spacing: 1px;
    }

    /* Login Card */
    .login-card {
      width: 100%;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      padding: 28px 24px 24px;
      border: 1px solid rgba(255,255,255,0.08);
      animation: fadeInUp 0.7s ease-out 0.4s both;
    }

    /* Card shimmer */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      animation: cardShimmer 6s ease-in-out infinite;
      border-radius: 20px;
    }
    @keyframes cardShimmer { 0%, 100% { left: -100%; } 50% { left: 140%; } }

    .login-card-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 24px;
    }

    /* Form */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.5); margin-bottom: 8px; letter-spacing: 0.5px; }
    .form-input-wrap { position: relative; }
    .form-input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); font-size: 14px; }
    .form-input-wrap .pwd-toggle { left: auto; right: 12px; }
    .form-input-wrap .pwd-toggle i { left: auto; position: static; transform: none; }
    .form-input {
      width: 100%;
      height: 46px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0 14px 0 40px;
      font-size: 14px;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    .form-input.has-toggle { padding-right: 40px; }
    .form-input::placeholder { color: rgba(255,255,255,0.25); }
    .form-input:focus { border-color: rgba(212,168,83,0.5); background: rgba(255,255,255,0.08); }

    /* Password toggle */
    .pwd-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      transition: color 0.2s;
    }
    .pwd-toggle:hover { color: rgba(255,255,255,0.6); }

    /* Captcha Row */
    .captcha-row { display: flex; gap: 10px; align-items: center; }
    .captcha-row .form-input { flex: 1; }
    .captcha-img {
      width: 110px;
      height: 46px;
      border-radius: 12px;
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.1);
      position: relative;
      transition: border-color 0.2s;
    }
    .captcha-img:hover { border-color: rgba(212,168,83,0.4); }
    .captcha-img canvas { width: 100%; height: 100%; display: block; }
    .captcha-refresh {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
    }

    /* Login Button */
    .login-btn {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, #D4A853, #B8860B);
      border: none;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(212,168,83,0.3);
      transition: all 0.3s;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      letter-spacing: 1px;
    }
    .login-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }
    .login-btn:hover::before { left: 100%; }
    .login-btn:active { transform: scale(0.97); }
    .login-btn i { font-size: 16px; }

    /* Error */
    .form-error {
      font-size: 12px;
      color: #EF4444;
      margin-top: 6px;
      display: none;
      align-items: center;
      gap: 4px;
    }
    .form-error.show { display: flex; }
    .form-error i { font-size: 11px; }

    /* Bottom Hint */
    .login-hint {
      margin-top: auto;
      padding-top: 28px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      animation: fadeInUp 0.7s ease-out 0.6s both;
    }

    /* Loading */
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10,22,40,0.85);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    .loading-overlay.show { display: flex; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .loading-spinner { width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.15); border-top-color: #D4A853; border-right-color: #D4A853; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 500; letter-spacing: 1px; }

    @media (max-width: 340px) {
      .login-content { padding: 0 20px 32px; }
      .login-brand h1 { font-size: 20px; }
      .login-card { padding: 24px 20px 20px; }
      .captcha-img { width: 100px; }
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">
      <span class="time" id="statusTime">09:41</span>
      <div class="status-icons">
        <i class="fas fa-signal"></i>
        <i class="fas fa-wifi"></i>
        <span class="battery"><span class="battery-fill"></span></span>
      </div>
    </div>

    <div class="particles" id="particles"></div>
    <div class="light-orb light-orb-1"></div>
    <div class="light-orb light-orb-2"></div>

    <div class="login-content">
      <div class="login-brand">
        <div class="login-logo">
          <img src="assets/logo.png" alt="海南演艺">
        </div>
        <h1>海南演艺</h1>
        <div class="admin-badge"><i class="fas fa-shield-alt"></i> 管理员端</div>
      </div>

      <div class="login-card" style="position:relative;">
        <h2 class="login-card-title">管理员登录</h2>

        <div class="form-group">
          <label class="form-label">账号</label>
          <div class="form-input-wrap">
            <i class="fas fa-user"></i>
            <input type="text" class="form-input" id="username" placeholder="请输入管理员账号" autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <div class="form-input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-input has-toggle" id="password" placeholder="请输入密码" autocomplete="current-password">
            <span class="pwd-toggle" onclick="togglePwd()"><i class="fas fa-eye-slash" id="pwdIcon"></i></span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">验证码</label>
          <div class="captcha-row">
            <div class="form-input-wrap">
              <i class="fas fa-shield-alt"></i>
              <input type="text" class="form-input" id="captchaInput" placeholder="请输入验证码" maxlength="4" autocomplete="off">
            </div>
            <div class="captcha-img" onclick="generateCaptcha()" title="点击刷新验证码">
              <canvas id="captchaCanvas" width="220" height="92"></canvas>
              <span class="captcha-refresh"><i class="fas fa-sync-alt"></i></span>
            </div>
          </div>
          <div class="form-error" id="captchaError"><i class="fas fa-exclamation-circle"></i><span>验证码错误</span></div>
        </div>

        <button class="login-btn" onclick="handleLogin()">
          <i class="fas fa-sign-in-alt"></i>
          <span>登录</span>
        </button>
      </div>

      <div class="login-hint">
        海南省演艺集团 · 场馆管理系统
      </div>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">登录中...</div>
  </div>

  <script>
    // Status bar time
    function updateTime() {
      var now = new Date();
      document.getElementById('statusTime').textContent =
        String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    }
    updateTime();
    setInterval(updateTime, 60000);

    // Particles
    (function() {
      var c = document.getElementById('particles');
      for (var i = 0; i < 15; i++) {
        var p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (7 + Math.random() * 8) + 's';
        p.style.animationDelay = Math.random() * 10 + 's';
        p.style.width = p.style.height = (2 + Math.random() * 2) + 'px';
        c.appendChild(p);
      }
    })();

    // Captcha
    var captchaCode = '';
    function generateCaptcha() {
      var canvas = document.getElementById('captchaCanvas');
      var ctx = canvas.getContext('2d');
      var w = canvas.width, h = canvas.height;

      // Background
      var colors = ['#1a2a3a', '#1e2d3d', '#162535', '#1a3040'];
      ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
      ctx.fillRect(0, 0, w, h);

      // Noise lines
      for (var i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.moveTo(Math.random() * w, Math.random() * h);
        ctx.lineTo(Math.random() * w, Math.random() * h);
        ctx.strokeStyle = 'rgba(' + Math.floor(Math.random()*100+50) + ',' + Math.floor(Math.random()*100+80) + ',' + Math.floor(Math.random()*100+100) + ',0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Noise dots
      for (var i = 0; i < 30; i++) {
        ctx.fillStyle = 'rgba(' + Math.floor(Math.random()*150+100) + ',' + Math.floor(Math.random()*150+100) + ',' + Math.floor(Math.random()*150+100) + ',0.4)';
        ctx.fillRect(Math.random() * w, Math.random() * h, 2, 2);
      }

      // Generate code
      var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      captchaCode = '';
      for (var i = 0; i < 4; i++) {
        captchaCode += chars[Math.floor(Math.random() * chars.length)];
      }

      // Draw text
      var fonts = ['bold 32px monospace', 'bold 30px Courier', 'bold 34px monospace'];
      var textColors = ['#D4A853', '#E8C97A', '#C49A3C', '#F0D88A'];
      for (var i = 0; i < 4; i++) {
        ctx.save();
        ctx.font = fonts[Math.floor(Math.random() * fonts.length)];
        ctx.fillStyle = textColors[i];
        ctx.textBaseline = 'middle';
        var x = 20 + i * 48;
        var y = h / 2 + (Math.random() * 12 - 6);
        ctx.translate(x, y);
        ctx.rotate((Math.random() - 0.5) * 0.4);
        ctx.fillText(captchaCode[i], 0, 0);
        ctx.restore();
      }

      // Clear error
      document.getElementById('captchaError').classList.remove('show');
      document.getElementById('captchaInput').value = '';
    }

    // Toggle password visibility
    function togglePwd() {
      var input = document.getElementById('password');
      var icon = document.getElementById('pwdIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye-slash';
      }
    }

    // Login
    function handleLogin() {
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;
      var captcha = document.getElementById('captchaInput').value.trim().toUpperCase();

      if (!username) { document.getElementById('username').focus(); return; }
      if (!password) { document.getElementById('password').focus(); return; }
      if (!captcha) { document.getElementById('captchaInput').focus(); return; }

      if (captcha !== captchaCode) {
        document.getElementById('captchaError').classList.add('show');
        generateCaptcha();
        return;
      }

      document.getElementById('captchaError').classList.remove('show');
      document.getElementById('loadingOverlay').classList.add('show');

      setTimeout(function() {
        document.getElementById('loadingOverlay').classList.remove('show');
        var redirect = sessionStorage.getItem('adminLoginRedirect');
        if (redirect) {
          sessionStorage.removeItem('adminLoginRedirect');
          window.location.href = redirect;
        } else {
          window.location.href = 'admin-home-verify.html';
        }
      }, 1500);
    }

    // Enter key login
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });

    // Init captcha
    generateCaptcha();
  </script>
</body>
</html>
